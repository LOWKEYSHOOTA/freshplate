<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>FreshPlate 🌿</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F4EE;--surface:#fff;--green:#1E4D2B;--green2:#2D6A3F;--green3:#4A8C5C;
  --terra:#C4622D;--terra2:#E07A45;--gold:#B8963E;--gold2:#D4AE5A;
  --text:#1A1A1A;--muted:#6B6357;--border:#DDD7CC;
  --cs:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.08);
  --csh:0 4px 8px rgba(0,0,0,.08),0 12px 32px rgba(0,0,0,.13);--r:14px;
  --nav-h:56px;--bot-h:64px;
}
html,body{height:100%;overflow-x:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
h1,h2,h3{font-family:'Playfair Display',serif}
input,button,select,textarea{font-family:'DM Sans',sans-serif}
button{cursor:pointer}
/* ── LAYOUT ── */
#root{display:flex;flex-direction:column;min-height:100vh}
.top-nav{background:var(--green);height:var(--nav-h);padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.22);flex-shrink:0}
.brand{font-family:'Playfair Display',serif;font-size:1.3rem;color:#fff;display:flex;align-items:center;gap:8px}
.brand-pill{font-size:.65rem;background:rgba(255,255,255,.18);border-radius:10px;padding:2px 8px;font-family:'DM Sans',sans-serif;font-weight:700;letter-spacing:.5px}
.top-nav-right{display:flex;gap:8px;align-items:center}
.icon-action{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:20px;padding:5px 12px;font-size:.78rem;font-weight:700;display:flex;align-items:center;gap:5px}
/* desktop tabs */
.desk-tabs{display:flex;gap:4px}
.dtab{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.85);padding:6px 14px;border-radius:20px;font-size:.78rem;font-weight:500;transition:all .15s;border:none}
.dtab:hover{background:rgba(255,255,255,.2)}
.dtab.on{background:var(--terra);color:#fff;font-weight:700}
/* mobile bottom tabs */
.bot-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bot-h);background:#fff;border-top:1px solid var(--border);z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.08)}
.bot-tabs{display:flex;height:100%}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;font-size:.62rem;font-weight:600;color:var(--muted);transition:color .15s;padding-bottom:env(safe-area-inset-bottom,0px)}
.btab .bico{font-size:1.35rem;line-height:1}
.btab.on{color:var(--green)}
.btab.on .bico{transform:scale(1.1)}
.page-wrap{flex:1;max-width:1180px;margin:0 auto;width:100%;padding:22px 20px 30px}
/* ── CARDS ── */
.meal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:24px}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--cs);display:flex;flex-direction:column;transition:box-shadow .2s,transform .2s}
.mcard:hover{box-shadow:var(--csh);transform:translateY(-2px)}
.mcard.pinned{border:2px solid var(--gold)}
.mcard-top{background:linear-gradient(135deg,var(--green),var(--green2) 60%,var(--green3));padding:14px 14px 10px;color:#fff;position:relative}
.mcard-badges{display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.mbadge{background:rgba(255,255,255,.18);border-radius:10px;padding:2px 8px;font-size:.68rem;font-weight:700}
.mbadge.toddler{background:rgba(255,220,60,.35);border:1px solid rgba(255,200,0,.4)}
.mcard-name{font-family:'Playfair Display',serif;font-size:1rem;line-height:1.25;margin-bottom:6px;padding-right:32px}
.mcard-meta{font-size:.73rem;opacity:.85;display:flex;gap:10px;flex-wrap:wrap}
.mcard-pin{position:absolute;top:12px;right:12px;background:none;border:none;font-size:1rem;opacity:.8;color:#fff}
.mcard-pin:hover{opacity:1;transform:scale(1.2)}
.mcard-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.mtag{background:rgba(255,255,255,.15);border-radius:8px;padding:2px 7px;font-size:.63rem;font-weight:700}
.mcard-body{padding:12px 14px;flex:1;display:flex;flex-direction:column;gap:8px}
.mcard-steps{font-size:.81rem;color:var(--muted);line-height:1.55}
/* macros */
.macro-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;background:#F4FAF6;border-radius:9px;padding:8px 10px}
.ms-item{text-align:center}
.ms-val{font-size:.9rem;font-weight:700;color:var(--green)}
.ms-lbl{font-size:.58rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.ms-bar{height:3px;border-radius:2px;background:#DDD;margin-top:3px;overflow:hidden}
.ms-fill{height:3px;border-radius:2px}
/* density */
.density-row{display:flex;gap:6px;flex-wrap:wrap}
.dp{background:rgba(255,255,255,.18);border-radius:7px;padding:2px 7px;font-size:.65rem;font-weight:700}
/* ingredients */
.ing-toggle{background:none;border:none;font-size:.72rem;font-weight:700;color:var(--green);padding:0;display:flex;align-items:center;gap:3px}
.ing-row{display:flex;justify-content:space-between;font-size:.77rem;padding:3px 0;border-bottom:1px solid #F3EFE8}
.ing-price{color:var(--green);font-weight:700;font-size:.74rem}
/* store chips */
.store-row{display:flex;gap:6px}
.schip{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:6px 8px;text-align:center}
.schip.best{border-color:var(--gold);background:#FDFBF3}
.schip-name{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.schip-price{font-size:.9rem;font-weight:700;color:var(--green);margin-top:1px}
.schip-badge{font-size:.6rem;font-weight:700;color:var(--terra)}
/* rating */
.rating-wrap{border-top:1px solid var(--border);padding-top:8px}
.rlbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px}
.stars{display:flex;gap:3px}
.star{font-size:1.4rem;color:#D5CFC5;line-height:1;transition:transform .1s}
.star.on{color:var(--gold2)}
.star:hover{transform:scale(1.2)}
.fb-chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.fbchip{border:1.5px solid var(--border);border-radius:10px;padding:3px 8px;font-size:.67rem;font-weight:700;background:#fff;color:var(--muted);transition:all .13s}
.fbchip.li{background:var(--green);color:#fff;border-color:var(--green)}
.fbchip.di{background:#C0392B;color:#fff;border-color:#C0392B}
/* card actions */
.card-acts{display:flex;gap:5px;margin-top:2px}
.cact{flex:1;border:1.5px solid var(--border);background:#fff;border-radius:8px;padding:7px 5px;font-size:.7rem;font-weight:700;transition:all .13s;color:var(--text)}
.cact:hover{border-color:var(--green);color:var(--green);background:#F2FAF4}
.cact.red{border-color:#E0C8C8;color:#A93226}
/* cook mode */
.cook-btn{background:var(--green);color:#fff;border:none;border-radius:8px;padding:7px;font-size:.7rem;font-weight:700;flex:1}
/* notes */
.note-in{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:6px 9px;font-size:.78rem;resize:none;outline:none;min-height:52px}
.note-in:focus{border-color:var(--green)}
/* ── PANELS ── */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:16px;box-shadow:var(--cs)}
.panel-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--green);margin-bottom:12px}
/* filters */
.fp-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.fp-title{font-weight:700;font-size:.84rem;color:var(--green);display:flex;align-items:center;gap:6px}
.fp-badge{background:var(--terra);color:#fff;border-radius:10px;padding:1px 7px;font-size:.66rem;font-weight:700}
.fp-body{margin-top:12px;display:flex;flex-direction:column;gap:12px}
.fp-sec{font-size:.68rem;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:-4px}
.fp-tog{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.fp-tog input{width:15px;height:15px;accent-color:var(--green);cursor:pointer}
.fp-tog span{font-size:.79rem;font-weight:500}
.sl-wrap{display:flex;align-items:center;gap:10px}
.sl-lbl{font-size:.76rem;font-weight:600;min-width:130px;white-space:nowrap}
.sl{flex:1;accent-color:var(--green)}
.sl-val{font-size:.76rem;font-weight:700;color:var(--green);min-width:34px;text-align:right}
.cat-chips{display:flex;flex-wrap:wrap;gap:5px}
.cchip{border:1.5px solid var(--border);border-radius:10px;padding:4px 10px;font-size:.72rem;font-weight:700;background:#fff;color:var(--text);transition:all .13s}
.cchip.exc{background:#FFEBEE;color:#C0392B;border-color:#C0392B}
.cchip.inc{background:#E8F5E9;color:var(--green);border-color:var(--green)}
.fp-reset{border:none;background:none;color:var(--muted);font-size:.74rem;font-weight:700;text-decoration:underline;padding:0}
/* controls bar */
.ctrl-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;box-shadow:var(--cs)}
.ctrl{display:flex;align-items:center;gap:7px}
.ctrl-lbl{font-size:.68rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}
.num-ctrl{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
.num-btn{width:32px;height:32px;border:none;background:#F2EFE9;font-size:1rem;display:flex;align-items:center;justify-content:center;color:var(--text)}
.num-val{width:36px;text-align:center;font-size:.88rem;font-weight:700;border:none;border-left:1.5px solid var(--border);border-right:1.5px solid var(--border);padding:5px 0;color:var(--green);background:#fff;outline:none}
.regen{background:var(--terra);color:#fff;border:none;padding:8px 18px;border-radius:18px;font-weight:700;font-size:.8rem;transition:all .15s;margin-left:auto}
.regen:hover{background:var(--terra2);transform:translateY(-1px)}
.share-btn{background:var(--green);color:#fff;border:none;padding:8px 14px;border-radius:18px;font-weight:700;font-size:.8rem}
/* summary */
.store-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.scard{border:2px solid var(--border);border-radius:11px;padding:13px 15px;position:relative}
.scard.win{border-color:var(--gold);background:#FDFBF5}
.win-badge{position:absolute;top:-9px;right:10px;background:var(--gold);color:#fff;font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:7px;text-transform:uppercase;letter-spacing:.4px}
.scard-name{font-weight:700;font-size:.9rem;margin-bottom:2px}
.scard-addr{font-size:.68rem;color:var(--muted);margin-bottom:6px}
.scard-total{font-size:1.65rem;font-weight:700;color:var(--green)}
.scard-sub{font-size:.68rem;color:var(--muted);margin-top:2px}
.nut-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.nb{background:#F4FAF6;border-radius:10px;padding:9px;text-align:center}
.nb-val{font-size:1.2rem;font-weight:700;color:var(--green)}
.nb-lbl{font-size:.62rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
/* AI panel */
.ai-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--cs);margin-bottom:16px}
.ai-row{display:flex;gap:6px;margin-top:8px}
.ai-in{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 11px;font-size:.84rem;outline:none}
.ai-in:focus{border-color:var(--green)}
.ai-go{background:var(--green);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-weight:700;font-size:.8rem}
.ai-go:disabled{opacity:.5}
.ai-resp{margin-top:8px;background:#F4FAF6;border:1px solid #C5DECA;border-radius:8px;padding:10px 12px;font-size:.8rem;line-height:1.6;white-space:pre-wrap}
/* taste */
.taste-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;box-shadow:var(--cs)}
.tc-name{font-family:'Playfair Display',serif;font-size:.88rem;margin-bottom:3px}
.tc-stars{color:var(--gold2);font-size:.8rem;font-weight:700;margin-bottom:5px}
.tl{background:#E8F5E9;color:#1E4D2B;border-radius:8px;padding:2px 7px;font-size:.65rem;font-weight:700;display:inline-block;margin:2px}
.td{background:#FFEBEE;color:#C0392B;border-radius:8px;padding:2px 7px;font-size:.65rem;font-weight:700;display:inline-block;margin:2px}
/* shopping */
.ing-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--cs)}
.ith th{background:var(--green);color:#fff;padding:8px 12px;font-size:.68rem;font-weight:700;letter-spacing:.4px;text-transform:uppercase;text-align:left}
.itb tr:nth-child(odd){background:#FAFAF8}
.itb td{padding:8px 12px;font-size:.79rem;border-bottom:1px solid var(--border)}
.ib{color:var(--terra);font-weight:700}
/* modals */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.ov{align-items:center}}
.modal{background:var(--surface);border-radius:var(--r) var(--r) 0 0;padding:20px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.2)}
@media(min-width:600px){.modal{border-radius:var(--r);max-width:560px;max-height:88vh}}
.modal-drag{width:40px;height:4px;background:#DDD;border-radius:2px;margin:0 auto 16px}
.modal-title{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--green);margin-bottom:14px}
.form-row{margin-bottom:11px}
.fl{font-size:.69rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px;display:block}
.fi{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:.84rem;outline:none;background:#fff}
.fi:focus{border-color:var(--green)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fta{resize:vertical;min-height:68px}
.macts{display:flex;gap:8px;margin-top:14px}
.btn-p{flex:1;background:var(--green);color:#fff;border:none;padding:10px;border-radius:9px;font-weight:700;font-size:.84rem}
.btn-c{background:none;border:1.5px solid var(--border);padding:10px 14px;border-radius:9px;font-weight:700;font-size:.84rem;color:var(--muted)}
/* cook mode full-screen */
.cook-screen{position:fixed;inset:0;background:#1E4D2B;z-index:400;display:flex;flex-direction:column;color:#fff;overflow:hidden}
.cook-hdr{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.15)}
.cook-body{flex:1;overflow-y:auto;padding:24px 20px}
.cook-step{background:rgba(255,255,255,.1);border-radius:12px;padding:16px;margin-bottom:12px;font-size:.95rem;line-height:1.6;display:flex;gap:12px;align-items:flex-start}
.cook-step.done{opacity:.45;text-decoration:line-through}
.cook-num{background:var(--terra);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0}
.cook-step.done .cook-num{background:rgba(255,255,255,.3)}
.cook-ing{background:rgba(255,255,255,.08);border-radius:10px;padding:12px;margin-top:12px}
.cook-ing-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.1);font-size:.82rem}
/* pantry */
.pantry-chip{background:#E8F5E9;border:1.5px solid var(--green3);border-radius:20px;padding:4px 10px;font-size:.72rem;font-weight:700;color:var(--green);display:inline-flex;align-items:center;gap:5px;margin:3px}
.pantry-chip button{background:none;border:none;color:var(--green);font-size:.8rem;padding:0;line-height:1}
/* weekly cal */
.week-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px}
.wday{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 6px;text-align:center;min-height:80px;cursor:pointer;transition:all .13s}
.wday:hover{border-color:var(--green3)}
.wday.has{background:#F0FBF4;border-color:var(--green3)}
.wday.sel{border:2px solid var(--green);background:#E8F5E9}
.wday-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.wday-meal{font-size:.63rem;font-weight:600;color:var(--green);line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.wday-empty{color:#CCC;font-size:.75rem;margin-top:8px}
/* budget tracker */
.budget-bar{background:#F4FAF6;border-radius:10px;padding:10px 14px;margin-bottom:12px}
.bb-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:.8rem;font-weight:700}
.bb-track{height:8px;background:#DDD;border-radius:4px;overflow:hidden}
.bb-fill{height:8px;border-radius:4px;background:var(--green);transition:width .4s}
.bb-fill.over{background:var(--terra)}
/* empty states */
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-ico{font-size:2.5rem;margin-bottom:8px}
.empty-t{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--green);margin-bottom:6px}
/* snoozed */
.snz-banner{background:#FFF8E1;border:1px solid #F0C84A;border-radius:var(--r);padding:10px 14px;margin-bottom:14px}
/* page header */
.ph{margin-bottom:16px}
.ph h1{font-size:1.7rem;color:var(--green);line-height:1.15}
.ph p{color:var(--muted);font-size:.84rem;margin-top:3px}
/* zone header */
.zone-hdr{padding:9px 14px;font-weight:700;font-size:.84rem;display:flex;justify-content:space-between;cursor:pointer}
/* shared view */
.sp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:24px}
/* responsive */
@media(max-width:767px){
  .desk-tabs{display:none}
  .bot-nav{display:block}
  .page-wrap{padding:14px 12px calc(var(--bot-h) + 16px)}
  .brand-pill{display:none}
  .meal-grid{grid-template-columns:1fr}
  .store-grid{grid-template-columns:1fr}
  .nut-grid{grid-template-columns:1fr 1fr}
  .ctrl-bar{gap:8px;padding:10px 12px}
  .sl-wrap{flex-direction:column;align-items:stretch;gap:4px}
  .sl-lbl{min-width:unset}
  .cat-chips{gap:4px}
  .cchip{font-size:.68rem;padding:3px 8px}
  .taste-grid{grid-template-columns:1fr}
  .week-cal{grid-template-columns:repeat(7,1fr);gap:3px}
  .wday{padding:5px 3px;min-height:64px}
  .wday-lbl{font-size:.58rem}
  .wday-meal{font-size:.56rem;-webkit-line-clamp:2}
  .ith th{padding:6px 8px;font-size:.62rem}
  .itb td{padding:6px 8px;font-size:.74rem}
}
@media(max-width:380px){
  .week-cal{gap:2px}
  .wday{padding:4px 2px;min-height:58px}
  .mcard-name{font-size:.92rem}
}
/* transitions */
.fade-in{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* export btn */
.exp-btn{background:var(--gold);color:#fff;border:none;padding:8px 14px;border-radius:18px;font-weight:700;font-size:.76rem}
.ai-rec-btn{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;border:none;padding:8px 16px;border-radius:18px;font-weight:700;font-size:.78rem;display:flex;align-items:center;gap:5px}

const CATS=["Chicken","Beef","Pork","Turkey","Eggs & Veggie","Pasta","Bowl"];
const DF={excludeCats:[],noSweetAsian:true,noFish:true,maxTime:30,minProtein:0,lowCarb:false,vegetarian:false};
const BF={name:"",cat:"Chicken",time:"25",protein:"35",cal:"450",carbs:"30",fat:"15",steps:"",ing:""};
const LIKES=["Quick to make","Kid-approved","Filling","Great leftovers","Flavorful","Budget-friendly","Low cleanup","Healthy feel","Great for meal prep"];
const DISLIKES=["Too many steps","Too spicy","Tedious prep","Too expensive","Too heavy","Dry","Not enough protein","Too many dishes","Bland","Messy"];

function filt(meals,f){return meals.filter(m=>{if(f.excludeCats&&f.excludeCats.includes(m.cat))return false;if(f.noSweetAsian&&m.tags.includes("sweet-asian"))return false;if(f.noFish&&(m.tags.includes("fish")||m.tags.includes("seafood")))return false;if(f.maxTime&&m.time>f.maxTime)return false;if(f.minProtein&&m.protein<f.minProtein)return false;if(f.lowCarb&&!m.tags.includes("low-carb"))return false;if(f.vegetarian&&!m.tags.includes("vegetarian"))return false;return true;});}
function mc(meal,frys,sv){const sc=sv/4;return meal.ing.reduce((s,[i,q])=>s+gp(i,frys,q*sc),0);}
function ws(pool,cnt){if(pool.length<=cnt)return[...pool];const w=pool.map(m=>Math.max(.5,(m.rating||1)**2.2));const sel=[],used=new Set();let t=0;while(sel.length<cnt&&t<800){t++;const tot=w.reduce((a,b)=>a+b,0);let r=Math.random()*tot;for(let i=0;i<pool.length;i++){r-=w[i];if(r<=0&&!used.has(pool[i].id)){sel.push({...pool[i]});used.add(pool[i].id);break;}}}return sel;}
function genPlan(db,f,cnt){const pinned=db.filter(m=>m.pinned).slice(0,cnt);const pids=new Set(pinned.map(m=>m.id));const pool=filt(db.filter(m=>!m.snoozedUntil||Date.now()>m.snoozedUntil),f).filter(m=>!pids.has(m.id));return[...pinned,...ws(pool,cnt-pinned.length)].slice(0,cnt);}

function encPlan(meals,sv,extras,gen){
  const s={v:sv,g:gen,e:(extras||[]).map(e=>({n:e.name,q:e.qty,z:e.zone,nt:e.note})),m:meals.map(m=>({n:m.name,c:m.cat,t:m.time,p:m.protein,k:m.cal,b:m.carbs,f:m.fat,s:m.steps,i:m.ing,td:m.tags&&m.tags.includes("toddler-friendly")?1:0}))};
  return btoa(unescape(encodeURIComponent(JSON.stringify(s)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function decPlan(raw){
  const b64=raw.replace(/-/g,'+').replace(/_/g,'/'),padded=b64+('==='.slice((b64.length+3)%4||4));
  const d=JSON.parse(decodeURIComponent(escape(atob(padded))));
  if(d.m)return{servings:d.v,generated:d.g,extras:(d.e||[]).map(e=>({name:e.n,qty:e.q,zone:e.z,note:e.nt})),meals:d.m.map(m=>({name:m.n,cat:m.c,time:m.t,protein:m.p,cal:m.k,carbs:m.b,fat:m.f,steps:m.s,ing:m.i,tags:m.td?["toddler-friendly"]:[]}))};
  return d;
}

function CookMode({meal,sv,onClose}){
  const [doneSteps,setDs]=useState(new Set());
  const sc=sv/4;
  const steps=meal.steps.split(/\.\s+/).filter(s=>s.trim().length>2);
  return(
    <div className="cook-screen">
      <div className="cook-hdr">
        <div>
          <div style={{fontSize:".7rem",opacity:.7,textTransform:"uppercase",letterSpacing:".6px"}}>{meal.cat}</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.1rem"}}>{meal.name}</div>
        </div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.3)",color:"#fff",borderRadius:20,padding:"6px 14px",fontWeight:700,fontSize:".78rem"}}>✕ Done</button>
      </div>
      <div className="cook-body">
        <div className="cook-ing" style={{marginBottom:20}}>
          <div style={{fontWeight:700,fontSize:".78rem",opacity:.7,textTransform:"uppercase",letterSpacing:".5px",marginBottom:8}}>Ingredients ({sv} servings)</div>
          {meal.ing.map(([item,qty])=>{const sq=qty*sc;return<div key={item} className="cook-ing-row"><span>{fq(item,sq)}{item}</span></div>;})}
        </div>
        <div style={{fontWeight:700,fontSize:".78rem",opacity:.7,textTransform:"uppercase",letterSpacing:".5px",marginBottom:10}}>Steps ({steps.length})</div>
        {steps.map((step,i)=>(
          <div key={i} className={`cook-step${doneSteps.has(i)?" done":""}`} onClick={()=>setDs(p=>{const n=new Set(p);n.has(i)?n.delete(i):n.add(i);return n;})}>
            <div className="cook-num">{i+1}</div>
            <div style={{flex:1}}>{step.trim()}{step.trim().endsWith(".")?"":" ."}</div>
          </div>
        ))}
        <div style={{textAlign:"center",marginTop:20,fontSize:".8rem",opacity:.6}}>{doneSteps.size}/{steps.length} steps done</div>
      </div>
    </div>
  );
}

  useEffect(()=>{

      if(d.pantry)setPantry(d.pantry);
    }
    loaded.current=true;
  },[sharedPlan]);

  const save=useCallback((patch={})=>{ls.set(SK,{db,week,sv,mc:mc2,filters,extras,ckShop,calAssign,budget,pantry,...patch});},[db,week,sv,mc2,filters,extras,ckShop,calAssign,budget,pantry]);
  const gen=useCallback((d=db,f=filters,c=mc2)=>{const p=genPlan(d,f,c);setWeek(p);ls.set(SK,{db:d,week:p,sv,mc:c,filters:f,extras,ckShop,calAssign,budget,pantry});},[db,filters,mc2,sv,extras,ckShop,calAssign,budget,pantry]);
  useEffect(()=>{if(loaded.current&&week.length===0)gen();});

  const swap=id=>{const cur=new Set(week.map(m=>m.id));const pool=filt(db.filter(m=>!m.snoozedUntil||Date.now()>m.snoozedUntil),filters).filter(m=>!cur.has(m.id));const alt=ws(pool,1);if(!alt.length)return;const nw=week.map(m=>m.id===id?{...alt[0]}:m);setWeek(nw);save({week:nw});};
  const pin=id=>{const u=l=>l.map(m=>m.id===id?{...m,pinned:!m.pinned}:m);const d2=u(db);const pm=d2.find(m=>m.id===id);let w2=u(week);if(pm&&pm.pinned&&!w2.find(m=>m.id===id))w2=[...w2,pm].slice(0,mc2+1);setDb(d2);setWeek(w2);save({db:d2,week:w2});};
  const snooze=id=>{const d2=db.map(m=>m.id===id?{...m,snoozedUntil:Date.now()+14*24*60*60*1000}:m);const w2=week.filter(m=>m.id!==id);setDb(d2);setWeek(w2);save({db:d2,week:w2});};
  const rate=(id,stars)=>{const u=l=>l.map(m=>{if(m.id!==id)return m;const nc=(m.ratingCount||0)+1;return{...m,rating:((m.rating||0)*(m.ratingCount||0)+stars)/nc,ratingCount:nc};});const d2=u(db);const w2=u(week);setDb(d2);setWeek(w2);save({db:d2,week:w2});};
  const fb=(id,type,tag)=>{const u=l=>l.map(m=>{if(m.id!==id)return m;const k=type==="like"?"likes":"dislikes";const cur=m[k]||[];return{...m,[k]:cur.includes(tag)?cur.filter(t=>t!==tag):[...cur,tag]};});const d2=u(db);const w2=u(week);setDb(d2);setWeek(w2);save({db:d2,week:w2});};
  const uf=(k,v)=>{const nf={...filters,[k]:v};setFilters(nf);gen(db,nf,mc2);};

          {pantry.length>0&&<div className="panel">
            <div className="panel-title">💡 Cook From Pantry</div>
            <p style={{fontSize:".78rem",color:"var(--muted)",marginBottom:10}}>Meals this week that use your pantry items:</p>
            {week.map(meal=>{const matches=meal.ing.filter(([i])=>pantry.map(p=>p.toLowerCase()).includes(i.toLowerCase()));if(!matches.length)return null;return<div key={meal.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid var(--border)",fontSize:".8rem"}}><span style={{fontWeight:600}}>{meal.name}</span><span style={{color:"var(--green)",fontWeight:700}}>✓ {matches.map(([i])=>i).join(", ")}</span></div>;})}
          </div>}
        </div>}

        {/* ── SHOPPING ── */}
        {tab==="shop"&&<div className="fade-in">
          <div className="ph"><h1>Shopping List</h1><p>{week.length} meals · {sv} servings · {ckCnt}/{allSK.length} done</p></div>
          {week.length===0?<div className="empty"><div className="empty-ico">🛒</div><div className="empty-t">No plan yet</div><p>Go to Meals first</p></div>
          :<div>
            <div className="panel" style={{marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontWeight:700,fontSize:".86rem",color:"var(--green)"}}>🛒 {ckCnt}/{allSK.length} done</span>
                  {ckCnt>0&&<button onClick={()=>{setCkShop({});save({ckShop:{}}); }} style={{background:"none",border:"none",fontSize:".72rem",color:"var(--muted)",cursor:"pointer",textDecoration:"underline",padding:0}}>Clear</button>}
                </div>
                <button onClick={()=>{const name=prompt("Item name:");if(!name||!name.trim())return;const qty=prompt("Quantity:")||"1";const note=prompt("Note (optional):")||"";const zone=gz(name.toLowerCase().trim());setExtras(prev=>{const n=[...prev,{id:Date.now(),name:name.trim(),qty,note,zone}];save({extras:n});return n;});}} style={{background:"var(--terra)",color:"#fff",border:"none",borderRadius:16,padding:"6px 16px",fontWeight:700,fontSize:".76rem",cursor:"pointer"}}>+ Add Item</button>
              </div>
            </div>
            <div className="panel" style={{marginBottom:14,padding:"10px 14px"}}>
              <div style={{fontWeight:700,color:"var(--green)",marginBottom:5,fontSize:".78rem"}}>🗺 Fry's Silverbell & Cortaro — Shop right → left</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:3}}>{zShow.map((z,i)=><span key={z.z} style={{background:z.c,borderRadius:8,padding:"2px 8px",fontWeight:700,fontSize:".63rem"}}>{i+1}. {z.z}</span>)}</div>
            </div>
            {zShow.map(z=>{
              const items=grpd[z.o]||[];
              const zCk=items.filter(({item,isExtra,eid})=>ckShop[isExtra?'ex_'+eid:item]).length;
              return(
                <div key={z.z} style={{marginBottom:10,border:"1.5px solid",borderColor:z.c,borderRadius:"var(--r)",overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
                  <div className="zone-hdr" style={{background:z.c}}>
                    <span style={{fontWeight:700,fontSize:".82rem"}}>{z.z}</span>
                    <span style={{fontSize:".76rem",fontWeight:700,color:"var(--green)"}}>{zCk}/{items.length}</span>
                  </div>
                  <div className="ing-table" style={{borderRadius:0,border:"none",boxShadow:"none"}}>
                    <table style={{width:"100%",borderCollapse:"collapse"}}>
                      <thead className="ith"><tr><th>Item</th><th>Qty</th><th>Fry's</th><th>Best</th></tr></thead>
                      <tbody className="itb">
                        {items.map(({item,qty,isExtra,eid,note})=>{
                          const key=isExtra?'ex_'+eid:item,done=!!ckShop[key];
                          const fp=isExtra?null:gp(item,true,qty);const sp=isExtra?null:gp(item,false,qty);
                          const q=typeof qty==="number"?qty:parseFloat(qty)||1;
                          const inP=!isExtra&&pantry.map(p=>p.toLowerCase()).includes(item.toLowerCase());
                          return(
                            <tr key={key} style={{opacity:done?.4:1,background:done?"#F0F4F0":inP?"#F0FBF3":undefined}}>
                              <td style={{fontWeight:600}}>
                                <div style={{display:"flex",alignItems:"center",gap:7}}>
                                  <input type="checkbox" checked={done} onChange={()=>tkShop(key)} style={{accentColor:"var(--green)",width:16,height:16,flexShrink:0}}/>
                                  <span style={{textDecoration:done?"line-through":"none",flex:1,fontSize:".78rem"}}>{isExtra&&"➕ "}{inP&&"✓ "}{item}{note&&<span style={{marginLeft:4,fontSize:".66rem",color:"var(--muted)",fontStyle:"italic"}}>{note}</span>}</span>
                                  {isExtra&&<button onClick={()=>{setExtras(prev=>{const n=prev.filter(e=>e.id!==eid);save({extras:n});return n;});}} style={{background:"none",border:"none",color:"#C0392B",fontSize:".78rem",cursor:"pointer"}}>✕</button>}
                                </div>
                              </td>
                              <td style={{fontWeight:700,color:done?"var(--muted)":"var(--green)",fontSize:".78rem"}}>{isExtra?(q%1===0?q:q.toFixed(1)):fq(item,q)}</td>
                              {!isExtra?<>
                                <td style={{color:done?"var(--muted)":undefined,fontSize:".78rem"}}>${fp.toFixed(2)}</td>
                                <td className="ib" style={{color:done?"var(--muted)":undefined,fontSize:".76rem"}}>{fp<=sp?"Fry's":"Safeway"}<br/><span style={{fontSize:".68rem"}}>(${Math.min(fp,sp).toFixed(2)})</span></td>
                              </>:<td colSpan={2} style={{color:"var(--muted)",fontSize:".74rem"}}>manual</td>}
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              );
            })}
          </div>}
        </div>}

        {/* ── TASTE ── */}
        {tab==="taste"&&<div className="fade-in">
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:16}}>
            <div className="ph" style={{marginBottom:0}}><h1>Taste Profile</h1><p>{rated.length} rated · {snoozed.length} snoozed</p></div>
            <button className="exp-btn" onClick={exportP}>⬇ Export JSON</button>
          </div>
          {snoozed.length>0&&<div className="snz-banner">
            <div style={{fontWeight:700,fontSize:".8rem",color:"#7D6008",marginBottom:6}}>😴 Snoozed ({snoozed.length}) — out of rotation</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>{snoozed.map(m=><span key={m.id} style={{background:"#fff",border:"1px solid #F0C84A",borderRadius:10,padding:"3px 10px",fontSize:".73rem",fontWeight:600,color:"#7D6008",display:"flex",gap:7,alignItems:"center"}}>{m.name}<button onClick={()=>{const d2=db.map(x=>x.id===m.id?{...x,snoozedUntil:null}:x);setDb(d2);save({db:d2});}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--green)",fontWeight:700,fontSize:".73rem",padding:0}}>↩</button></span>)}</div>
          </div>}
          {rated.length===0?<div className="empty"><div className="empty-ico">⭐</div><div className="empty-t">No ratings yet</div><p>Rate meals to build your profile</p></div>
          :<div className="taste-grid">{rated.map(m=>(
            <div key={m.id} className="tcard">
              <div className="tc-name">{m.name}</div>
              <div className="tc-stars">{"★".repeat(Math.round(m.rating))}{"☆".repeat(5-Math.round(m.rating))} {m.rating.toFixed(1)} ({m.ratingCount}×)</div>
              <div style={{fontSize:".72rem",color:"var(--muted)",marginBottom:4}}>{m.protein}g protein · {m.cal} cal · {m.time}min</div>
              {m.note&&<div style={{fontSize:".72rem",color:"#7D6008",background:"#FFF8E1",borderRadius:7,padding:"3px 7px",marginBottom:4}}>📝 {m.note}</div>}
              <div>{(m.likes||[]).map(t=><span key={t} className="tl">👍 {t}</span>)}</div>
              <div style={{marginTop:3}}>{(m.dislikes||[]).map(t=><span key={t} className="td">👎 {t}</span>)}</div>
            </div>
          ))}</div>}
          {rated.length>0&&<div className="panel" style={{marginTop:16}}>
            <div className="panel-title" style={{fontSize:".96rem"}}>📋 Profile Summary</div>
            <div style={{fontSize:".8rem",color:"var(--muted)",lineHeight:1.7}}>
              <p><strong>Most liked:</strong> {[...new Set(rated.flatMap(m=>m.likes||[]))].slice(0,4).join(", ")||"None yet"}</p>
              <p><strong>Most disliked:</strong> {[...new Set(rated.flatMap(m=>m.dislikes||[]))].slice(0,4).join(", ")||"None yet"}</p>
              <p><strong>Avg rating:</strong> {(rated.reduce((a,m)=>a+m.rating,0)/rated.length).toFixed(1)}★ across {rated.length} meals</p>
              <p style={{marginTop:8,fontSize:".74rem",background:"#F4FAF6",borderRadius:8,padding:"8px 10px"}}>💡 Export your profile and bring it back to Claude to expand your recipe library based on what your family loves.</p>
            </div>
          </div>}
        </div>}

        {/* ── LIBRARY ── */}
        {tab==="library"&&<div className="fade-in">
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:16}}>
            <div className="ph" style={{marginBottom:0}}><h1>Meal Library</h1><p>{db.length} total · {db.filter(m=>m.custom).length} custom</p></div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button className="ai-rec-btn" onClick={()=>setShowAiR(true)}>🤖 Describe Recipe</button>
              <button className="add-btn" onClick={()=>setShowAdd(true)}>＋ Add</button>
            </div>
          </div>
          <div className="meal-grid">{db.map(meal=>{
            const dm=db.find(m=>m.id===meal.id)||meal;
            const inW=week.find(m=>m.id===meal.id);
            const isSn=dm.snoozedUntil&&Date.now()<dm.snoozedUntil;
            return(
              <div key={meal.id} className={"mcard"+(dm.pinned?" pinned":"")} style={{opacity:isSn?.5:1}}>
                <div className="mcard-top">
                  <button className="mcard-pin" onClick={()=>pin(meal.id)}>{dm.pinned?"📌":"🖇️"}</button>
                  <div className="mcard-badges">
                    <span className="mbadge">⏱ {meal.time}m</span>
                    <span className="mbadge">{meal.cat}</span>
                    {inW&&<span className="mbadge" style={{background:"rgba(255,255,255,.3)"}}>this week</span>}
                    {meal.tags&&meal.tags.includes("toddler-friendly")&&<span className="mbadge toddler">👶</span>}
                    {isSn&&<span className="mbadge">😴 snoozed</span>}
                  </div>
                  <div className="mcard-name">{meal.name}</div>
                  <div className="mcard-meta"><span>{meal.protein}g prot</span><span>{meal.cal} cal</span></div>
                </div>
                <div className="mcard-body">
                  <p className="mcard-steps">{meal.steps}</p>
                  {dm.rating>0&&<div style={{color:"var(--gold2)",fontSize:".88rem",fontWeight:700}}>{"★".repeat(Math.round(dm.rating))}{"☆".repeat(5-Math.round(dm.rating))} {dm.rating.toFixed(1)}</div>}
                  {dm.note&&<div style={{fontSize:".74rem",color:"#7D6008",background:"#FFF8E1",borderRadius:7,padding:"4px 8px"}}>📝 {dm.note}</div>}
                  {isSn&&<button onClick={()=>{const d2=db.map(x=>x.id===meal.id?{...x,snoozedUntil:null}:x);setDb(d2);save({db:d2});}} style={{background:"none",border:"1px solid var(--green)",color:"var(--green)",borderRadius:8,padding:"4px 10px",fontSize:".74rem",fontWeight:700,cursor:"pointer"}}>↩ Restore</button>}
                </div>
              </div>
            );
          })}</div>
        </div>}
      </div>

      {/* ── BOTTOM NAV (mobile) ── */}
      <div className="bot-nav">
        <div className="bot-tabs">{TABS.map(([k,ico,lbl])=>(
          <button key={k} className={"btab"+(tab===k?" on":"")} onClick={()=>setTab(k)}>
            <span className="bico">{ico}</span>
            <span>{lbl}</span>
          </button>
        ))}</div>
      </div>

      {/* ── SHARE MODAL ── */}
      {shareUrl&&<div className="ov" onClick={e=>e.target.className==="ov"&&setShareUrl(null)}>
        <div className="modal">
          <div className="modal-drag"/>
          <div className="modal-title">🔗 Share This Week</div>
          <p style={{fontSize:".81rem",color:"var(--muted)",lineHeight:1.6,marginBottom:12}}>Send to anyone — they'll get all {week.length} meals + shopping list organized by Fry's zone. No login needed.</p>
          <div style={{background:"#F4FAF6",border:"1px solid #C5DECA",borderRadius:8,padding:"9px 11px",fontSize:".72rem",wordBreak:"break-all",color:"#1E4D2B",marginBottom:12,lineHeight:1.5}}>{shareUrl}</div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn-p" onClick={()=>{navigator.clipboard.writeText(shareUrl).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});}} style={{background:copied?"#2D6A3F":"var(--green)"}}>{copied?"✓ Copied!":"📋 Copy Link"}</button>
            <button className="btn-c" onClick={()=>setShareUrl(null)}>Close</button>
          </div>
        </div>
      </div>}

      {/* ── ADD MEAL MODAL ── */}
      {showAdd&&<div className="ov" onClick={e=>e.target.className==="ov"&&setShowAdd(false)}>
        <div className="modal">
          <div className="modal-drag"/>
          <div className="modal-title">＋ Add Meal Manually</div>
          <div className="form-row"><label className="fl">Meal Name *</label><input className="fi" value={addF.name} onChange={e=>setAddF(f=>({...f,name:e.target.value}))} placeholder="e.g. Mom's Chicken Soup"/></div>
          <div className="form-row"><label className="fl">Category</label><select className="fi" value={addF.cat} onChange={e=>setAddF(f=>({...f,cat:e.target.value}))}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
          <div className="form-row g2"><div><label className="fl">Cook Time (min)</label><input className="fi" type="number" value={addF.time} onChange={e=>setAddF(f=>({...f,time:e.target.value}))}/></div><div><label className="fl">Protein (g/4 srv)</label><input className="fi" type="number" value={addF.protein} onChange={e=>setAddF(f=>({...f,protein:e.target.value}))}/></div></div>
          <div className="form-row g3"><div><label className="fl">Calories</label><input className="fi" type="number" value={addF.cal} onChange={e=>setAddF(f=>({...f,cal:e.target.value}))}/></div><div><label className="fl">Carbs (g)</label><input className="fi" type="number" value={addF.carbs} onChange={e=>setAddF(f=>({...f,carbs:e.target.value}))}/></div><div><label className="fl">Fat (g)</label><input className="fi" type="number" value={addF.fat} onChange={e=>setAddF(f=>({...f,fat:e.target.value}))}/></div></div>
          <div className="form-row"><label className="fl">Ingredients (one per line: "item, qty")</label><textarea className="fi fta" placeholder={"chicken breast, 1.5\nrice, 0.4\ngarlic, 1"} value={addF.ing} onChange={e=>setAddF(f=>({...f,ing:e.target.value}))}/></div>
          <div className="form-row"><label className="fl">Instructions</label><textarea className="fi fta" value={addF.steps} onChange={e=>setAddF(f=>({...f,steps:e.target.value}))} placeholder="How to make it..."/></div>
          <div className="macts"><button className="btn-c" onClick={()=>setShowAdd(false)}>Cancel</button><button className="btn-p" onClick={addMeal} disabled={!addF.name.trim()}>Add to Library</button></div>
        </div>
      </div>}

      {/* ── AI RECIPE MODAL ── */}
      {showAiR&&<div className="ov" onClick={e=>e.target.className==="ov"&&setShowAiR(false)}>
        <div className="modal">
          <div className="modal-drag"/>
          <div className="modal-title">🤖 Describe a Recipe</div>
          <p style={{fontSize:".81rem",color:"var(--muted)",marginBottom:12,lineHeight:1.6}}>Describe any meal in plain English and I'll convert it into a full recipe card.</p>
          <textarea className="fi fta" style={{minHeight:90}} placeholder={'e.g. "My mom\'s green chile chicken casserole with cream of mushroom, green chiles, shredded cheese and crushed chips, bakes for 30 min"'} value={aiRI} onChange={e=>setAiRI(e.target.value)}/>
          <div className="macts"><button className="btn-c" onClick={()=>setShowAiR(false)}>Cancel</button><button className="btn-p" onClick={addAiR} disabled={aiRL||!aiRI.trim()}>{aiRL?"🤖 Converting...":"Add to Library"}</button></div>
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
