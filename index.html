<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>FreshPlate 🌿</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F4EE;--surface:#fff;--green:#1E4D2B;--green2:#2D6A3F;--green3:#4A8C5C;
  --terra:#C4622D;--terra2:#E07A45;--gold:#B8963E;--gold2:#D4AE5A;
  --text:#1A1A1A;--muted:#6B6357;--border:#DDD7CC;
  --cs:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.08);
  --csh:0 4px 8px rgba(0,0,0,.08),0 12px 32px rgba(0,0,0,.13);--r:14px;
  --nav-h:56px;--bot-h:64px;
}
html,body{height:100%;overflow-x:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
h1,h2,h3{font-family:'Playfair Display',serif}
input,button,select,textarea{font-family:'DM Sans',sans-serif}
button{cursor:pointer}
#root{display:flex;flex-direction:column;min-height:100vh}
.top-nav{background:var(--green);height:var(--nav-h);padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.22);flex-shrink:0}
.brand{font-family:'Playfair Display',serif;font-size:1.3rem;color:#fff;display:flex;align-items:center;gap:8px}
.brand-pill{font-size:.65rem;background:rgba(255,255,255,.18);border-radius:10px;padding:2px 8px;font-family:'DM Sans',sans-serif;font-weight:700;letter-spacing:.5px}
.top-nav-right{display:flex;gap:8px;align-items:center}
.icon-action{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:20px;padding:5px 12px;font-size:.78rem;font-weight:700;display:flex;align-items:center;gap:5px}
.desk-tabs{display:flex;gap:4px}
.dtab{background:rgba(255,255,255,.1);color:rgba(255,255,255,.85);padding:6px 14px;border-radius:20px;font-size:.78rem;font-weight:500;transition:all .15s;border:none}
.dtab:hover{background:rgba(255,255,255,.2)}
.dtab.on{background:var(--terra);color:#fff;font-weight:700}
.bot-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bot-h);background:#fff;border-top:1px solid var(--border);z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.08)}
.bot-tabs{display:flex;height:100%}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;font-size:.62rem;font-weight:600;color:var(--muted);transition:color .15s;padding-bottom:env(safe-area-inset-bottom,0px)}
.btab .bico{font-size:1.35rem;line-height:1}
.btab.on{color:var(--green)}
.btab.on .bico{transform:scale(1.1)}
.page-wrap{flex:1;max-width:1180px;margin:0 auto;width:100%;padding:22px 20px 30px}
.meal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:24px}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--cs);display:flex;flex-direction:column;transition:box-shadow .2s,transform .2s}
.mcard:hover{box-shadow:var(--csh);transform:translateY(-2px)}
.mcard.pinned{border:2px solid var(--gold)}
.mcard-top{background:linear-gradient(135deg,var(--green),var(--green2) 60%,var(--green3));padding:14px 14px 10px;color:#fff;position:relative}
.mcard-badges{display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.mbadge{background:rgba(255,255,255,.18);border-radius:10px;padding:2px 8px;font-size:.68rem;font-weight:700}
.mbadge.toddler{background:rgba(255,220,60,.35);border:1px solid rgba(255,200,0,.4)}
.mcard-name{font-family:'Playfair Display',serif;font-size:1rem;line-height:1.25;margin-bottom:6px;padding-right:32px}
.mcard-meta{font-size:.73rem;opacity:.85;display:flex;gap:10px;flex-wrap:wrap}
.mcard-pin{position:absolute;top:12px;right:12px;background:none;border:none;font-size:1rem;opacity:.8;color:#fff}
.mcard-pin:hover{opacity:1;transform:scale(1.2)}
.mcard-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.mtag{background:rgba(255,255,255,.15);border-radius:8px;padding:2px 7px;font-size:.63rem;font-weight:700}
.mcard-body{padding:12px 14px;flex:1;display:flex;flex-direction:column;gap:8px}
.mcard-steps{font-size:.81rem;color:var(--muted);line-height:1.55}
.macro-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;background:#F4FAF6;border-radius:9px;padding:8px 10px}
.ms-item{text-align:center}
.ms-val{font-size:.9rem;font-weight:700;color:var(--green)}
.ms-lbl{font-size:.58rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.ms-bar{height:3px;border-radius:2px;background:#DDD;margin-top:3px;overflow:hidden}
.ms-fill{height:3px;border-radius:2px}
.density-row{display:flex;gap:6px;flex-wrap:wrap}
.dp{background:rgba(255,255,255,.18);border-radius:7px;padding:2px 7px;font-size:.65rem;font-weight:700}
.ing-toggle{background:none;border:none;font-size:.72rem;font-weight:700;color:var(--green);padding:0;display:flex;align-items:center;gap:3px}
.ing-row{display:flex;justify-content:space-between;font-size:.77rem;padding:3px 0;border-bottom:1px solid #F3EFE8}
.ing-price{color:var(--green);font-weight:700;font-size:.74rem}
.rating-wrap{border-top:1px solid var(--border);padding-top:8px}
.rlbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px}
.stars{display:flex;gap:3px}
.star{font-size:1.4rem;color:#D5CFC5;line-height:1;transition:transform .1s}
.star.on{color:var(--gold2)}
.star:hover{transform:scale(1.2)}
.fb-chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.fbchip{border:1.5px solid var(--border);border-radius:10px;padding:3px 8px;font-size:.67rem;font-weight:700;background:#fff;color:var(--muted);transition:all .13s}
.fbchip.li{background:var(--green);color:#fff;border-color:var(--green)}
.fbchip.di{background:#C0392B;color:#fff;border-color:#C0392B}
.card-acts{display:flex;gap:5px;margin-top:2px}
.cact{flex:1;border:1.5px solid var(--border);background:#fff;border-radius:8px;padding:7px 5px;font-size:.7rem;font-weight:700;transition:all .13s;color:var(--text)}
.cact:hover{border-color:var(--green);color:var(--green);background:#F2FAF4}
.cact.red{border-color:#E0C8C8;color:#A93226}
.cook-btn{background:var(--green);color:#fff;border:none;border-radius:8px;padding:7px;font-size:.7rem;font-weight:700;flex:1}
.note-in{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:6px 9px;font-size:.78rem;resize:none;outline:none;min-height:52px}
.note-in:focus{border-color:var(--green)}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:16px;box-shadow:var(--cs)}
.panel-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--green);margin-bottom:12px}
.fp-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.fp-title{font-weight:700;font-size:.84rem;color:var(--green);display:flex;align-items:center;gap:6px}
.fp-badge{background:var(--terra);color:#fff;border-radius:10px;padding:1px 7px;font-size:.66rem;font-weight:700}
.fp-body{margin-top:12px;display:flex;flex-direction:column;gap:12px}
.fp-sec{font-size:.68rem;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:-4px}
.fp-tog{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.fp-tog input{width:15px;height:15px;accent-color:var(--green);cursor:pointer}
.fp-tog span{font-size:.79rem;font-weight:500}
.sl-wrap{display:flex;align-items:center;gap:10px}
.sl-lbl{font-size:.76rem;font-weight:600;min-width:130px;white-space:nowrap}
.sl{flex:1;accent-color:var(--green)}
.sl-val{font-size:.76rem;font-weight:700;color:var(--green);min-width:34px;text-align:right}
.cat-chips{display:flex;flex-wrap:wrap;gap:5px}
.cchip{border:1.5px solid var(--border);border-radius:10px;padding:4px 10px;font-size:.72rem;font-weight:700;background:#fff;color:var(--text);transition:all .13s}
.cchip.exc{background:#FFEBEE;color:#C0392B;border-color:#C0392B}
.cchip.inc{background:#E8F5E9;color:var(--green);border-color:var(--green)}
.fp-reset{border:none;background:none;color:var(--muted);font-size:.74rem;font-weight:700;text-decoration:underline;padding:0}
.ctrl-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;box-shadow:var(--cs)}
.ctrl{display:flex;align-items:center;gap:7px}
.ctrl-lbl{font-size:.68rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}
.num-ctrl{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
.num-btn{width:32px;height:32px;border:none;background:#F2EFE9;font-size:1rem;display:flex;align-items:center;justify-content:center;color:var(--text)}
.num-val{width:36px;text-align:center;font-size:.88rem;font-weight:700;border:none;border-left:1.5px solid var(--border);border-right:1.5px solid var(--border);padding:5px 0;color:var(--green);background:#fff;outline:none}
.regen{background:var(--terra);color:#fff;border:none;padding:8px 18px;border-radius:18px;font-weight:700;font-size:.8rem;transition:all .15s;margin-left:auto}
.regen:hover{background:var(--terra2);transform:translateY(-1px)}
.nut-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.nb{background:#F4FAF6;border-radius:10px;padding:9px;text-align:center}
.nb-val{font-size:1.2rem;font-weight:700;color:var(--green)}
.nb-lbl{font-size:.62rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.ai-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--cs);margin-bottom:16px}
.ai-row{display:flex;gap:6px;margin-top:8px}
.ai-in{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 11px;font-size:.84rem;outline:none}
.ai-in:focus{border-color:var(--green)}
.ai-go{background:var(--green);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-weight:700;font-size:.8rem}
.ai-go:disabled{opacity:.5}
.ai-resp{margin-top:8px;background:#F4FAF6;border:1px solid #C5DECA;border-radius:8px;padding:10px 12px;font-size:.8rem;line-height:1.6;white-space:pre-wrap}
.taste-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;box-shadow:var(--cs)}
.tc-name{font-family:'Playfair Display',serif;font-size:.88rem;margin-bottom:3px}
.tc-stars{color:var(--gold2);font-size:.8rem;font-weight:700;margin-bottom:5px}
.tl{background:#E8F5E9;color:#1E4D2B;border-radius:8px;padding:2px 7px;font-size:.65rem;font-weight:700;display:inline-block;margin:2px}
.td{background:#FFEBEE;color:#C0392B;border-radius:8px;padding:2px 7px;font-size:.65rem;font-weight:700;display:inline-block;margin:2px}
.ing-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--cs)}
.ith th{background:var(--green);color:#fff;padding:8px 12px;font-size:.68rem;font-weight:700;letter-spacing:.4px;text-transform:uppercase;text-align:left}
.itb tr:nth-child(odd){background:#FAFAF8}
.itb td{padding:8px 12px;font-size:.79rem;border-bottom:1px solid var(--border)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.ov{align-items:center}}
.modal{background:var(--surface);border-radius:var(--r) var(--r) 0 0;padding:20px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.2)}
@media(min-width:600px){.modal{border-radius:var(--r);max-width:560px;max-height:88vh}}
.modal-drag{width:40px;height:4px;background:#DDD;border-radius:2px;margin:0 auto 16px}
.modal-title{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--green);margin-bottom:14px}
.form-row{margin-bottom:11px}
.fl{font-size:.69rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px;display:block}
.fi{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:.84rem;outline:none;background:#fff}
.fi:focus{border-color:var(--green)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fta{resize:vertical;min-height:68px}
.macts{display:flex;gap:8px;margin-top:14px}
.btn-p{flex:1;background:var(--green);color:#fff;border:none;padding:10px;border-radius:9px;font-weight:700;font-size:.84rem}
.btn-c{background:none;border:1.5px solid var(--border);padding:10px 14px;border-radius:9px;font-weight:700;font-size:.84rem;color:var(--muted)}
.cook-screen{position:fixed;inset:0;background:#1E4D2B;z-index:400;display:flex;flex-direction:column;color:#fff;overflow:hidden}
.cook-hdr{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.15)}
.cook-body{flex:1;overflow-y:auto;padding:24px 20px}
.cook-step{background:rgba(255,255,255,.1);border-radius:12px;padding:16px;margin-bottom:12px;font-size:.95rem;line-height:1.6;display:flex;gap:12px;align-items:flex-start}
.cook-step.done{opacity:.45;text-decoration:line-through}
.cook-num{background:var(--terra);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0}
.cook-step.done .cook-num{background:rgba(255,255,255,.3)}
.cook-ing{background:rgba(255,255,255,.08);border-radius:10px;padding:12px;margin-top:12px}
.cook-ing-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.1);font-size:.82rem}
.pantry-chip{background:#E8F5E9;border:1.5px solid var(--green3);border-radius:20px;padding:4px 10px;font-size:.72rem;font-weight:700;color:var(--green);display:inline-flex;align-items:center;gap:5px;margin:3px}
.pantry-chip button{background:none;border:none;color:var(--green);font-size:.8rem;padding:0;line-height:1}
.week-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px}
.wday{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 6px;text-align:center;min-height:80px;cursor:pointer;transition:all .13s}
.wday:hover{border-color:var(--green3)}
.wday.has{background:#F0FBF4;border-color:var(--green3)}
.wday-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.wday-meal{font-size:.63rem;font-weight:600;color:var(--green);line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.wday-empty{color:#CCC;font-size:.75rem;margin-top:8px}
.budget-bar{background:#F4FAF6;border-radius:10px;padding:10px 14px;margin-bottom:12px}
.bb-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:.8rem;font-weight:700}
.bb-track{height:8px;background:#DDD;border-radius:4px;overflow:hidden}
.bb-fill{height:8px;border-radius:4px;background:var(--green);transition:width .4s}
.bb-fill.over{background:var(--terra)}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-ico{font-size:2.5rem;margin-bottom:8px}
.empty-t{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--green);margin-bottom:6px}
.snz-banner{background:#FFF8E1;border:1px solid #F0C84A;border-radius:var(--r);padding:10px 14px;margin-bottom:14px}
.ph{margin-bottom:16px}
.ph h1{font-size:1.7rem;color:var(--green);line-height:1.15}
.ph p{color:var(--muted);font-size:.84rem;margin-top:3px}
.zone-hdr{padding:9px 14px;font-weight:700;font-size:.84rem;display:flex;justify-content:space-between;cursor:pointer}
.sp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:24px}
@media(max-width:767px){
  .desk-tabs{display:none}.bot-nav{display:block}
  .page-wrap{padding:14px 12px calc(var(--bot-h) + 16px)}
  .brand-pill{display:none}.meal-grid{grid-template-columns:1fr}
  .nut-grid{grid-template-columns:1fr 1fr}
  .ctrl-bar{gap:8px;padding:10px 12px}
  .sl-wrap{flex-direction:column;align-items:stretch;gap:4px}
  .sl-lbl{min-width:unset}.cat-chips{gap:4px}
  .cchip{font-size:.68rem;padding:3px 8px}
  .taste-grid{grid-template-columns:1fr}
  .week-cal{gap:3px}.wday{padding:5px 3px;min-height:64px}
  .wday-lbl{font-size:.58rem}.wday-meal{font-size:.56rem;-webkit-line-clamp:2}
  .ith th{padding:6px 8px;font-size:.62rem}.itb td{padding:6px 8px;font-size:.74rem}
}
@media(max-width:380px){.week-cal{gap:2px}.wday{padding:4px 2px;min-height:58px}.mcard-name{font-size:.92rem}}
.fade-in{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.exp-btn{background:var(--gold);color:#fff;border:none;padding:8px 14px;border-radius:18px;font-weight:700;font-size:.76rem}
.ai-rec-btn{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;border:none;padding:8px 16px;border-radius:18px;font-weight:700;font-size:.78rem;display:flex;align-items:center;gap:5px}
.add-btn{background:var(--green);color:#fff;border:none;padding:8px 16px;border-radius:18px;font-weight:700;font-size:.78rem}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;
const SK="fp_v9";

   steps:"Poach or boil chicken breasts in salted water 15 minutes. Drain and shred with two forks. In a small saucepan over low heat, melt butter with hot sauce until combined. Pour over shredded chicken and toss well to coat every piece. Separate large iceberg lettuce leaves to use as cups — rinse and pat dry. Fill each lettuce cup with buffalo chicken. Top with thinly sliced celery, shredded cheese, sliced green onions, and a drizzle of ranch dressing."},
  {id:"c14",name:"Chicken Tortilla Soup",time:30,protein:40,cal:420,carbs:36,fat:12,cat:"Chicken",tags:["soup","mexican","toddler-friendly"],
   ing:[["chicken breast",1.5],["canned tomatoes",1],["black beans",1],["corn",2],["chicken broth",1],["onion",1],["garlic",1],["taco seasoning",0.5],["shredded cheese",0.5],["sour cream",0.25],["tortilla chips",0.5]],
   steps:"Dice onion and mince garlic. Heat oil in a large pot over medium heat. Cook onion 3–4 minutes. Add garlic and taco seasoning, stir 1 minute. Add whole chicken breasts, canned tomatoes with juices, drained black beans, corn kernels, and chicken broth. Bring to a boil, then reduce heat and simmer 20 minutes. Remove chicken, shred with two forks, and return to the soup. Season with salt and pepper. Ladle into bowls and top with shredded cheese, a dollop of sour cream, and crushed tortilla chips for crunch."},
  {id:"c15",name:"Teriyaki Chicken & Broccoli",time:20,protein:44,cal:460,carbs:34,fat:10,cat:"Chicken",tags:["asian","fast","toddler-friendly"],
   ing:[["chicken breast",1.5],["broccoli",1.5],["teriyaki sauce",0.3],["rice",0.4],["garlic",1],["sesame oil",0.05],["green onions",1],["sesame seeds",0.1]],
   steps:"Cook rice per package directions. Cut chicken into 1-inch cubes and slice broccoli into small florets. Heat sesame oil in a large skillet or wok over high heat. Add chicken and cook 5–6 minutes, stirring often, until cooked through and starting to caramelize. Push chicken to the side. Add broccoli and stir-fry 3–4 minutes until bright green and just tender. Add minced garlic and cook 30 seconds. Pour teriyaki sauce over everything and toss to coat. Cook 1–2 more minutes until sauce thickens slightly and everything is glazed. Serve over rice and garnish with sliced green onions and sesame seeds."},
  {id:"c16",name:"Chicken Caesar Wraps",time:15,protein:42,cal:440,carbs:28,fat:18,cat:"Chicken",tags:["fast","meal-prep"],
   ing:[["chicken breast",1.5],["tortillas",1],["romaine lettuce",1],["parmesan",0.5],["ranch dressing",0.2],["lemon",1]],
   steps:"Cook chicken breasts in a lightly oiled skillet over medium-high heat 5–6 minutes per side until cooked through. Let rest 5 minutes, then slice thin or chop. Chop romaine lettuce into bite-sized pieces. In a large bowl, toss romaine with ranch dressing, grated parmesan, and a squeeze of lemon juice. Warm tortillas in a dry skillet or microwave. Lay out each tortilla and layer with dressed romaine and sliced chicken. Fold the bottom up, then roll tightly. Cut in half on a diagonal to serve."},
  {id:"c17",name:"Chicken Fried Rice",time:25,protein:40,cal:480,carbs:48,fat:14,cat:"Chicken",tags:["asian","fast","toddler-friendly"],
   ing:[["chicken breast",1.25],["rice",0.4],["eggs",4],["frozen peas",0.5],["soy sauce",0.3],["sesame oil",0.1],["garlic",1],["green onions",1],["carrots",1]],
   steps:"Cook rice ahead of time and spread on a tray to cool completely — day-old rice works best and fries instead of steaming. Dice chicken and carrots, and mince garlic. Heat oil in a large wok or skillet over high heat. Add chicken and cook 4–5 minutes until done. Push to the side. Add carrots and peas, stir-fry 2 minutes. Push everything to the side and scramble eggs in the center until just set. Add cold rice, breaking up any clumps. Drizzle soy sauce and sesame oil over everything and stir-fry together 2–3 minutes until rice starts to crisp slightly. Garnish with sliced green onions."},
  {id:"c18",name:"Chicken & Sweet Potato Curry",time:30,protein:40,cal:500,carbs:42,fat:16,cat:"Chicken",tags:["indian","comfort","toddler-friendly"],
   ing:[["chicken thighs",2],["sweet potato",2],["coconut milk",1],["onion",1],["garlic",1],["ginger",1],["curry powder",0.2],["chicken broth",0.5],["rice",0.4]],
   steps:"Peel and cut sweet potatoes into ¾-inch cubes. Dice onion. Cut chicken thighs into 1½-inch pieces. Heat oil in a large pot over medium heat. Cook onion 4 minutes until softened. Add garlic, ginger, and curry powder, stir 1 minute until fragrant. Add chicken and cook 4 minutes, stirring occasionally. Add sweet potato cubes, coconut milk, and chicken broth. Stir to combine. Bring to a boil, then reduce heat, cover, and simmer 18 minutes until sweet potatoes are fork-tender and chicken is cooked through. Season with salt. Cook rice while curry simmers. Serve curry over rice."},
  {id:"c19",name:"Lemon Garlic Chicken Thighs",time:25,protein:42,cal:400,carbs:6,fat:22,cat:"Chicken",tags:["low-carb","fast","toddler-friendly","one-pan"],
   ing:[["chicken thighs",2],["garlic",1],["lemon",2],["butter",0.15],["thyme",0.1],["chicken broth",0.25]],
   steps:"Pat chicken thighs completely dry with paper towels — this is key for crispy skin. Season both sides generously with salt and pepper. Heat oil in a large oven-safe skillet over medium-high heat until very hot. Place chicken skin-side down and press down slightly with a spatula. Cook 7 minutes without moving until skin is deep golden and crispy. Flip and cook 3 more minutes. Remove chicken. Add butter to the pan, then minced garlic, and cook 30 seconds. Add chicken broth and lemon juice, scraping up any browned bits. Nestle chicken back in skin-side up. Transfer to a 400°F oven for 12 minutes until cooked through. Spoon pan sauce over chicken and garnish with fresh thyme."},
  {id:"c20",name:"Chicken Meatball Soup",time:30,protein:38,cal:380,carbs:28,fat:12,cat:"Chicken",tags:["soup","toddler-friendly","meal-prep"],
   ing:[["ground turkey",1.5],["chicken broth",1],["orzo",0.5],["spinach",1],["carrots",2],["celery",3],["onion",1],["garlic",1],["parmesan",0.5],["eggs",2],["breadcrumbs",0.25]],
   steps:"Make meatballs: combine ground turkey, beaten eggs, breadcrumbs, grated parmesan, minced garlic, salt, and pepper in a bowl. Mix gently until just combined. Roll into 1-inch balls and set aside. Dice onion, carrots, and celery. Heat oil in a large pot over medium heat. Cook onion, carrots, and celery 5 minutes. Add minced garlic and cook 1 minute. Pour in chicken broth and bring to a boil. Gently drop meatballs into the simmering broth. Cook 8 minutes until meatballs float and are cooked through. Stir in dry orzo and cook 7–8 minutes until tender. Stir in spinach and cook 1 minute until wilted. Season generously with salt and pepper."},
  // ── BEEF ──
  {id:"b01",name:"Ground Beef & Zucchini Skillet",time:20,protein:42,cal:410,carbs:14,fat:22,cat:"Beef",tags:["low-carb","fast","toddler-friendly"],
   ing:[["ground beef 90/10",1.25],["zucchini",2],["canned tomatoes",1],["garlic",1],["onion",1],["shredded cheese",0.5],["italian seasoning",0.1]],
   steps:"Dice zucchini into ½-inch half-moons and dice onion. Mince garlic. Heat a large skillet over medium-high heat. Add ground beef and cook 5–6 minutes, breaking it up with a spoon, until browned. Drain excess fat if needed. Add onion and cook 3 minutes. Add garlic and Italian seasoning, stir 1 minute. Add zucchini and canned tomatoes with their juices. Stir to combine. Simmer uncovered over medium heat 8–10 minutes until zucchini is tender and sauce has reduced slightly. Season with salt and pepper. Sprinkle shredded cheese over top, cover for 1 minute until melted, and serve straight from the pan."},
  {id:"b02",name:"Beef & Broccoli Stir-Fry",time:20,protein:45,cal:450,carbs:28,fat:18,cat:"Beef",tags:["asian","fast","toddler-friendly"],
   ing:[["beef sirloin",1.25],["broccoli",1],["soy sauce",0.3],["sesame oil",0.1],["garlic",1],["ginger",1],["rice",0.4],["oyster sauce",0.15],["brown sugar",0.1]],
   steps:"Cook rice per package directions. Slice beef sirloin as thin as possible against the grain — partially freezing the meat for 20 minutes makes this easier. Mix soy sauce, oyster sauce, and brown sugar in a bowl to make the sauce. Cut broccoli into small florets. Heat oil in a wok or large skillet over maximum heat. Sear beef in a single layer 1–2 minutes per side until browned — work in batches if needed, don't crowd. Remove beef. Add broccoli and stir-fry 3 minutes. Add garlic and ginger, stir 30 seconds. Return beef to the pan, pour sauce over everything, and toss to coat. Cook 1 minute until sauce thickens. Drizzle with sesame oil. Serve over rice."},
  {id:"b03",name:"Turkey Taco Bowls",time:20,protein:44,cal:470,carbs:38,fat:14,cat:"Beef",tags:["mexican","fast","toddler-friendly"],
   ing:[["ground turkey",1.5],["rice",0.4],["black beans",1],["salsa",0.5],["shredded cheese",1],["avocado",1],["taco seasoning",0.5]],
   steps:"Cook rice per package directions. Heat oil in a skillet over medium-high heat. Add ground turkey and cook 6–7 minutes, breaking it apart, until no pink remains. Drain excess liquid. Sprinkle in taco seasoning along with 2–3 tablespoons of water. Stir and cook 2 minutes until turkey is well coated. Warm black beans in a small saucepan. Dice avocado. Assemble bowls: start with rice, add seasoned turkey, black beans, and salsa. Top with shredded cheese and diced avocado."},
  {id:"b04",name:"Beef Chili",time:30,protein:43,cal:450,carbs:34,fat:18,cat:"Beef",tags:["comfort","meal-prep","toddler-friendly"],
   ing:[["ground beef 90/10",1.5],["kidney beans",2],["canned tomatoes",2],["onion",1],["bell peppers",2],["garlic",1],["tomato paste",1],["chili powder",0.2],["cumin",0.15]],
   steps:"Dice onion and bell pepper. Mince garlic. Heat a large pot over medium-high heat. Brown ground beef 5–6 minutes, breaking it apart. Drain most of the fat. Add onion and bell pepper and cook 4 minutes. Add garlic, chili powder, and cumin, stir 1 minute. Stir in tomato paste and cook 2 minutes until it darkens slightly — this deepens the flavor. Add canned tomatoes and drained kidney beans. Stir well. Bring to a boil, then reduce heat to a low simmer. Cook uncovered 20 minutes, stirring occasionally, until thickened. Season with salt and pepper."},
  {id:"b05",name:"Smash Burger Bowls",time:20,protein:44,cal:460,carbs:8,fat:26,cat:"Beef",tags:["comfort","fast","low-carb","toddler-friendly"],
   ing:[["ground beef 90/10",1.25],["shredded cheese",1],["onion",1],["tomato",2],["cucumber",1],["sour cream",0.5],["dijon mustard",0.1],["romaine lettuce",1]],
   steps:"Divide ground beef into 2-oz balls — no seasoning yet. Heat a cast-iron skillet over high heat until smoking. Place a beef ball on the skillet and immediately smash it flat with a spatula. Season with salt and pepper. Cook 2 minutes without moving until edges are crispy and browned. Flip, add shredded cheese on top, and cook 1 more minute. Repeat with remaining portions. Chop romaine lettuce and slice tomato and cucumber. Build each bowl with the chopped romaine, sliced tomato, cucumber, and a burger patty on top. Dollop with sour cream and a small drizzle of mustard."},
  {id:"b06",name:"Beef Stew",time:30,protein:38,cal:420,carbs:30,fat:14,cat:"Beef",tags:["comfort","meal-prep","soup","toddler-friendly"],
   ing:[["beef stew meat",1.5],["russet potato",3],["carrots",3],["onion",1],["beef broth",1],["tomato paste",1],["garlic",1],["celery",3],["worcestershire",0.1]],
   steps:"Cut beef stew meat into 1-inch cubes if not already done. Pat dry and season with salt and pepper. Cut potatoes into 1-inch cubes, slice carrots, dice onion and celery, mince garlic. Heat oil in a large heavy pot over high heat. Sear beef in batches — do not crowd — 2 minutes per side until deeply browned. Set aside. Reduce heat to medium. Cook onion, celery, and carrots 4 minutes. Add garlic and tomato paste, stir 1 minute. Return beef to pot. Add broth and worcestershire. Bring to a boil, then reduce to a gentle simmer. Add potatoes. Cook covered 20–25 minutes until beef and vegetables are very tender."},
  {id:"b07",name:"Carne Asada Bowls",time:25,protein:48,cal:490,carbs:36,fat:16,cat:"Beef",tags:["mexican","fast","toddler-friendly"],
   ing:[["flank steak",1.5],["rice",0.4],["black beans",1],["avocado",2],["salsa",0.5],["lime",3],["cilantro",1],["red onion",0.5],["cumin",0.1]],
   steps:"Combine the juice of 2 limes, minced garlic, cumin, a drizzle of olive oil, and salt in a bowl or zip bag. Add flank steak and marinate 10–15 minutes at room temperature while you prep everything else. Cook rice per package directions with a pinch of salt. Warm black beans in a small pan. Dice avocado and slice red onion thin. Heat a grill pan or cast-iron skillet over high heat until very hot. Remove steak from marinade and pat slightly dry. Cook 3–4 minutes per side for medium-rare, or to your liking. Let rest 5–7 minutes before slicing — the juices need to redistribute. Slice thin against the grain. Assemble bowls with rice, steak, beans, avocado, salsa, red onion, and fresh cilantro."},
  {id:"b08",name:"Beef Tacos",time:20,protein:42,cal:460,carbs:34,fat:20,cat:"Beef",tags:["mexican","fast","toddler-friendly"],
   ing:[["ground beef 90/10",1.5],["taco shells",1],["shredded cheese",1],["tomato",2],["avocado",1],["sour cream",0.5],["taco seasoning",1]],
   steps:"Brown ground beef in a skillet over medium-high heat 5–6 minutes, breaking it apart. Drain excess grease. Add taco seasoning and ¼ cup water. Stir and simmer 2–3 minutes until the meat absorbs the seasoning and looks slightly saucy. Warm taco shells in the oven at 325°F for 5 minutes or per package directions. Dice tomatoes and avocado. Fill shells with seasoned beef, then add cheese, tomato, avocado, and sour cream."},
  {id:"b09",name:"Philly Cheesesteak Skillet",time:20,protein:44,cal:470,carbs:16,fat:24,cat:"Beef",tags:["comfort","fast","low-carb"],
   ing:[["beef sirloin",1.5],["bell peppers",2],["onion",1],["mushrooms",1],["provolone cheese",4],["worcestershire",0.1],["garlic",1]],
   steps:"Slice beef sirloin as thin as possible against the grain. Slice bell peppers, onion, and mushrooms into strips. Heat oil in a large cast-iron skillet over high heat. Add beef in a thin layer and cook 2 minutes without stirring, then stir and cook 1 more minute. Remove and set aside. In the same pan, cook peppers and onions over medium-high heat 5 minutes until softened and lightly charred. Add mushrooms and cook 3 more minutes. Add garlic and worcestershire, stir 30 seconds. Return beef to the pan and toss everything together. Lay slices of provolone over the top, cover with a lid for 1–2 minutes until melted. Serve straight from the pan."},
  {id:"b10",name:"Korean Ground Beef Bowls",time:20,protein:40,cal:450,carbs:30,fat:20,cat:"Beef",tags:["asian","fast","toddler-friendly"],
   ing:[["ground beef 90/10",1.5],["rice",0.4],["soy sauce",0.25],["sesame oil",0.1],["garlic",1],["ginger",1],["brown sugar",0.15],["green onions",1],["red pepper flakes",0.05],["sesame seeds",0.1]],
   steps:"Cook rice per package directions. Mix together soy sauce, brown sugar, sesame oil, and red pepper flakes in a small bowl to make the sauce. Heat a large skillet over medium-high heat. Add ground beef and cook 5–6 minutes, breaking it apart, until browned. Drain excess fat. Add minced garlic and grated ginger, stir 1 minute. Pour the sauce over the meat and stir to coat. Cook 2 more minutes until the sauce slightly caramelizes. Serve over rice and garnish with sliced green onions and sesame seeds."},
  {id:"b11",name:"Beef & Bean Burrito Bake",time:30,protein:42,cal:490,carbs:42,fat:18,cat:"Beef",tags:["mexican","meal-prep","toddler-friendly"],
   ing:[["ground beef 90/10",1.25],["refried beans",1],["tortillas",1],["shredded cheese",1.5],["enchilada sauce",1],["onion",1],["taco seasoning",0.5],["sour cream",0.25]],
   steps:"Preheat oven to 375°F. Brown ground beef with diced onion over medium-high heat 6 minutes. Drain fat. Add taco seasoning and 2 tablespoons water, stir and cook 2 minutes. Spread a thin layer of enchilada sauce in the bottom of a 9×13 baking dish. Warm tortillas briefly so they roll without tearing. Spread each tortilla with a spoonful of refried beans, a scoop of seasoned beef, and a sprinkle of cheese. Roll tightly and place seam-side down in the dish. Pour remaining enchilada sauce over the top and cover completely with shredded cheese. Bake 20 minutes until bubbly and golden. Serve with sour cream."},
  {id:"b12",name:"Classic Spaghetti & Meat Sauce",time:30,protein:44,cal:540,carbs:52,fat:18,cat:"Beef",tags:["italian","comfort","toddler-friendly","meal-prep"],
   ing:[["ground beef 90/10",1.25],["pasta",1],["canned tomatoes",2],["tomato paste",1],["onion",1],["garlic",1],["italian seasoning",0.15],["parmesan",0.5]],
   steps:"Cook pasta per package directions until al dente. Drain and set aside, reserving ½ cup pasta water. Dice onion and mince garlic. Heat oil in a large pot over medium-high heat. Brown ground beef 5–6 minutes, breaking it apart. Drain most fat. Add onion and cook 3 minutes. Add garlic and Italian seasoning, cook 1 minute. Stir in tomato paste and cook 2 minutes until darkened. Add canned tomatoes with juices, crushing them. Simmer uncovered 15 minutes, stirring occasionally, until thickened. Season with salt and pepper. Add pasta to the sauce and toss, adding a splash of pasta water to loosen if needed. Top with grated parmesan."},
  {id:"b13",name:"Beef Quesadillas",time:15,protein:40,cal:440,carbs:32,fat:22,cat:"Beef",tags:["mexican","fast","toddler-friendly"],
   ing:[["ground beef 90/10",1],["tortillas",1],["shredded cheese",1.5],["bell peppers",1],["onion",1],["taco seasoning",0.4],["sour cream",0.25]],
   steps:"Brown ground beef with diced bell pepper and onion in a skillet over medium-high heat 5–6 minutes. Drain fat. Season with taco seasoning and 2 tablespoons water, stir and cook 1 minute. Remove filling to a bowl. Wipe out the skillet and heat over medium heat. Place a tortilla in the pan. Sprinkle cheese on half the tortilla, then add a layer of beef filling, then more cheese on top. Fold the tortilla in half, pressing gently. Cook 2–3 minutes per side until golden and crispy. Cut into wedges and serve with sour cream and salsa."},
  {id:"b14",name:"Stuffed Bell Peppers",time:30,protein:38,cal:400,carbs:28,fat:16,cat:"Beef",tags:["comfort","toddler-friendly","meal-prep"],
   ing:[["ground beef 90/10",1.25],["bell peppers",4],["rice",0.3],["canned tomatoes",1],["onion",1],["garlic",1],["shredded cheese",1],["tomato paste",0.5],["italian seasoning",0.1]],
   steps:"Preheat oven to 375°F. Cook rice halfway — about 8 minutes — since it will finish cooking inside the peppers. Cut the tops off bell peppers and remove seeds and membranes. Stand them upright in a baking dish. Brown ground beef with diced onion over medium-high heat 5 minutes. Drain fat. Add garlic, Italian seasoning, tomato paste, canned tomatoes, and partially cooked rice. Stir and cook 2 minutes. Season with salt and pepper. Spoon filling into each bell pepper, packing it down. Top each with shredded cheese. Add ¼ cup water to the bottom of the baking dish, cover with foil, and bake 25 minutes. Remove foil for the last 5 minutes to brown the cheese."},
  {id:"b15",name:"Salisbury Steak & Egg Noodles",time:30,protein:42,cal:510,carbs:38,fat:22,cat:"Beef",tags:["comfort","toddler-friendly"],
   ing:[["ground beef 90/10",1.5],["egg noodles",1],["mushrooms",1.5],["beef broth",1],["onion",1],["worcestershire",0.15],["butter",0.15],["cream of mushroom soup",1]],
   steps:"Cook egg noodles per package directions, drain, and toss with a little butter. While noodles cook, mix ground beef with minced garlic, salt, pepper, and a splash of worcestershire sauce. Shape into 4 oval patties about ¾-inch thick. Heat oil in a large skillet over medium-high heat. Cook patties 3–4 minutes per side until browned, then remove to a plate. In the same pan, melt butter and cook sliced mushrooms and diced onion 5 minutes until softened. Add beef broth and cream of mushroom soup. Stir to combine, scraping up browned bits. Return patties to the pan. Simmer 8–10 minutes until cooked through and gravy thickens. Serve over buttered egg noodles."},
  // ── PORK ──
  {id:"p01",name:"Pork Tenderloin & Sweet Potato Mash",time:30,protein:46,cal:470,carbs:30,fat:14,cat:"Pork",tags:["comfort","toddler-friendly"],
   ing:[["pork tenderloin",1.5],["sweet potato",2],["spinach",1],["olive oil",0.1],["garlic",1],["butter",0.1],["rosemary",0.1],["milk",0.25]],
   steps:"Preheat oven to 400°F. Peel and cube sweet potatoes. Boil in salted water 15 minutes until very fork-tender. Drain and mash with butter, milk, salt, and pepper until smooth. Season pork tenderloin with salt, pepper, garlic powder, and minced rosemary. Heat oil in an oven-safe skillet over medium-high heat. Sear pork 2–3 minutes per side until browned on all sides. Transfer pan to oven and roast 15–18 minutes until internal temperature reaches 145°F. Let rest 5 minutes before slicing. While pork rests, wilt spinach with minced garlic in the same skillet over medium heat, 2 minutes. Slice pork and serve over sweet potato mash with wilted spinach on the side."},
  {id:"p02",name:"Carnitas Bowls",time:30,protein:44,cal:490,carbs:38,fat:16,cat:"Pork",tags:["mexican","meal-prep","toddler-friendly"],
   ing:[["pork tenderloin",1.5],["rice",0.4],["black beans",1],["salsa",0.5],["avocado",1],["lime",2],["cilantro",1],["onion",1],["cumin",0.15],["oregano",0.1]],
   steps:"Slice pork tenderloin into 1-inch pieces. Season with cumin, dried oregano, garlic powder, salt, and pepper. Cook rice per package directions with a pinch of salt and a squeeze of lime. Heat oil in a large skillet over medium-high heat. Add pork and sear 3–4 minutes per side until browned. Add ¼ cup water or broth, reduce heat, cover, and cook 10 minutes until cooked through. Uncover and increase heat to high. Cook until all liquid evaporates and pork starts to caramelize and crisp up, 3–4 minutes, stirring occasionally. Squeeze lime over pork. Warm black beans. Dice avocado. Assemble bowls with rice, pork, beans, salsa, diced avocado, and fresh cilantro."},
  {id:"p03",name:"Italian Sausage & Peppers Pasta",time:25,protein:40,cal:530,carbs:46,fat:20,cat:"Pork",tags:["italian","comfort","toddler-friendly"],
   ing:[["Italian sausage",1.25],["bell peppers",3],["onion",1],["canned tomatoes",1],["pasta",1],["garlic",1],["parmesan",1],["red pepper flakes",0.05]],
   steps:"Cook pasta per package directions until al dente. Reserve ½ cup pasta water before draining. Slice sausage into ½-inch rounds. Slice bell peppers and onion into strips. Heat oil in a large skillet over medium-high heat. Brown sausage rounds 3–4 minutes per side until deeply golden. Remove and set aside. In the same pan, cook peppers and onion over medium-high heat 5 minutes until softened and slightly charred. Add garlic and red pepper flakes, cook 1 minute. Add canned tomatoes, crush them, and simmer 8 minutes. Return sausage to the pan. Add drained pasta and toss, adding pasta water as needed to loosen the sauce. Top with grated parmesan."},
  {id:"p04",name:"Egg Roll in a Bowl",time:20,protein:34,cal:380,carbs:14,fat:20,cat:"Pork",tags:["asian","low-carb","fast","toddler-friendly"],
   ing:[["ground pork",1.25],["eggs",4],["cabbage",1],["carrots",2],["soy sauce",0.3],["sesame oil",0.1],["garlic",1],["ginger",1],["green onions",1]],
   steps:"Shred cabbage thinly and shred or julienne carrots. Mince garlic and grate ginger. Heat oil in a large skillet or wok over medium-high heat. Add ground pork and cook 5–6 minutes, breaking it apart, until cooked through. Push pork to the sides of the pan. Crack eggs into the center and scramble them until just set, then mix into the pork. Add garlic and ginger, stir 30 seconds. Add shredded cabbage and carrots. Stir-fry everything together 3–4 minutes until cabbage is wilted but still has a little crunch. Drizzle soy sauce and sesame oil over the top. Stir to coat and cook 1 more minute. Top with sliced green onions."},
  {id:"p05",name:"Pork Chops with Apple & Onion",time:25,protein:38,cal:420,carbs:18,fat:20,cat:"Pork",tags:["comfort","fast","toddler-friendly"],
   ing:[["pork chops",2],["onion",1],["apple",2],["butter",0.15],["chicken broth",0.25],["thyme",0.1],["dijon mustard",0.1]],
   steps:"Pat pork chops dry and season both sides generously with salt and pepper. Heat oil in a large skillet over medium-high heat. Sear chops 3–4 minutes per side until golden brown. Remove and set aside on a plate. Reduce heat to medium. Add butter, then sliced onion. Cook 4 minutes until softened. Add sliced apple (peeled or not) and thyme. Cook 3 more minutes. Add chicken broth and dijon mustard, stirring to combine. Nestle pork chops back into the pan among the apples and onions. Cover and cook 5 minutes until chops are cooked through (145°F). Let rest 3 minutes, then spoon the apple-onion mixture over the chops to serve."},
  {id:"p06",name:"Breakfast Burritos",time:20,protein:36,cal:450,carbs:34,fat:22,cat:"Pork",tags:["fast","toddler-friendly","meal-prep"],
   ing:[["chorizo",0.75],["eggs",6],["bell peppers",1],["onion",1],["tortillas",1],["shredded cheese",1],["salsa",0.5]],
   steps:"Dice bell pepper and onion. Heat oil in a large skillet over medium heat. Cook chorizo, breaking it apart, 4–5 minutes until browned. Add bell pepper and onion, cook 3 more minutes. Push everything to the sides of the pan. Whisk eggs with a pinch of salt. Pour into the center of the pan. Let sit 30 seconds, then slowly push and fold the eggs with a spatula, incorporating the chorizo and veggies as the eggs cook. Remove from heat while eggs are still slightly soft — they'll finish cooking from residual heat. Warm tortillas in a dry skillet. Lay out each tortilla, add a scoop of egg mixture, shredded cheese, and a spoonful of salsa. Fold the bottom up, then fold in the sides and roll tight."},
  {id:"p07",name:"Pulled Pork Sliders",time:30,protein:38,cal:460,carbs:38,fat:16,cat:"Pork",tags:["comfort","toddler-friendly"],
   ing:[["pork tenderloin",1.5],["burger buns",1],["barbecue sauce",0.5],["coleslaw mix",1],["apple cider vinegar",0.1],["brown sugar",0.1],["shredded cheese",0.5]],
   steps:"Slice pork tenderloin into 2-inch chunks. Season with salt, pepper, smoked paprika, and garlic powder. Heat oil in a pot or Dutch oven over medium-high heat. Sear pork on all sides 5 minutes until browned. Add barbecue sauce, brown sugar, and ½ cup water. Bring to a boil, then cover and reduce to a medium-low simmer for 20 minutes until pork is very tender. Use two forks to shred the pork in the pot, mixing it with the sauce. In a bowl, toss coleslaw mix with apple cider vinegar, a pinch of sugar, and salt for a quick slaw. Warm buns. Pile pork onto buns, top with slaw and shredded cheese."},
  {id:"p08",name:"Ham & Cheese Frittata",time:25,protein:36,cal:370,carbs:8,fat:22,cat:"Pork",tags:["low-carb","meal-prep","toddler-friendly"],
   ing:[["ham",0.5],["eggs",1.5],["bell peppers",1],["onion",1],["shredded cheese",1],["olive oil",0.1],["spinach",0.5],["milk",0.1]],
   steps:"Preheat oven to 375°F. Dice ham and bell pepper. Slice onion. Whisk eggs with a splash of milk, salt, and pepper in a bowl until well combined. Stir in half the shredded cheese. Heat oil in a 10-inch oven-safe skillet over medium heat. Sauté onion and bell pepper 4 minutes until soft. Add ham and cook 2 minutes. Add spinach and stir until wilted, 1 minute. Spread vegetables evenly in the pan. Pour egg mixture evenly over the vegetables — do not stir. Sprinkle remaining cheese on top. Cook on the stovetop 2–3 minutes until just the edges begin to set. Transfer skillet to oven and bake 12–14 minutes until the center is fully set and top is lightly golden. Cool 5 minutes before slicing into wedges."},
  {id:"p09",name:"Pork Fried Noodles",time:20,protein:36,cal:480,carbs:44,fat:18,cat:"Pork",tags:["asian","fast","toddler-friendly"],
   ing:[["ground pork",1.25],["lo mein noodles",1],["cabbage",0.5],["carrots",1],["soy sauce",0.3],["sesame oil",0.1],["garlic",1],["ginger",1],["green onions",1],["eggs",2]],
   steps:"Cook lo mein noodles per package directions until just tender. Drain and rinse with cold water. Shred cabbage and carrots. Heat oil in a large wok or skillet over high heat. Add ground pork and cook 4–5 minutes, breaking it apart. Push to the side. Crack eggs in the center and scramble until just set, then mix with pork. Add garlic and ginger, stir 30 seconds. Add cabbage and carrots, stir-fry 2–3 minutes. Add noodles. Drizzle soy sauce and sesame oil over everything and toss together over high heat 2 minutes until well combined and slightly caramelized. Top with sliced green onions."},
  {id:"p10",name:"Kielbasa & Veggie Sheet Pan",time:25,protein:32,cal:400,carbs:24,fat:22,cat:"Pork",tags:["one-pan","fast","toddler-friendly"],
   ing:[["kielbasa",1.25],["bell peppers",3],["onion",1],["russet potato",3],["olive oil",0.15],["smoked paprika",0.1],["garlic",1]],
   steps:"Preheat oven to 425°F. Slice kielbasa into ½-inch rounds. Cut bell peppers and onion into 1-inch chunks. Cube potatoes into ½-inch pieces. Toss all vegetables and kielbasa together on a large rimmed sheet pan with olive oil, smoked paprika, minced garlic, salt, and pepper. Spread in a single layer — use two pans if needed to avoid crowding. Roast 20–22 minutes, stirring once halfway through, until potatoes are golden and tender and kielbasa is lightly caramelized. Serve straight from the pan."},
  // ── TURKEY ──
  {id:"t01",name:"Turkey Stuffed Zucchini Boats",time:30,protein:38,cal:390,carbs:14,fat:16,cat:"Turkey",tags:["low-carb","toddler-friendly"],
   ing:[["ground turkey",1.25],["zucchini",4],["canned tomatoes",1],["shredded cheese",1],["onion",1],["garlic",1],["italian seasoning",0.1]],
   steps:"Preheat oven to 375°F. Slice zucchini in half lengthwise. Scoop out the center flesh with a spoon, leaving a ¼-inch wall. Roughly chop the scooped flesh and set aside. Place zucchini halves cut-side up in a baking dish. Brown ground turkey with diced onion in a skillet over medium-high heat 5–6 minutes. Drain any liquid. Add garlic, the reserved zucchini flesh, canned tomatoes (drained), and Italian seasoning. Cook 5 minutes until mixture is mostly dry — wet filling makes soggy boats. Season with salt and pepper. Spoon filling into each zucchini boat. Top with shredded cheese. Bake 20 minutes until zucchini is tender and cheese is bubbly."},
  {id:"t02",name:"Turkey Bolognese",time:30,protein:42,cal:500,carbs:42,fat:14,cat:"Turkey",tags:["italian","meal-prep","toddler-friendly"],
   ing:[["ground turkey",1.5],["pasta",1],["canned tomatoes",2],["tomato paste",1],["onion",1],["carrots",1],["celery",2],["garlic",1],["parmesan",1],["milk",0.25]],
   steps:"Cook pasta per package directions. Reserve ½ cup pasta water before draining. Finely dice onion, carrots, and celery. Mince garlic. Heat oil in a large heavy-bottomed pot over medium heat. Cook onion, carrot, and celery together 6 minutes until very soft. Add garlic and cook 1 minute. Add ground turkey and cook 6–7 minutes, breaking it apart until well browned. Stir in tomato paste and cook 2 minutes. Add canned tomatoes with juices. Pour in milk, which mellows the acidity and gives richness. Simmer uncovered 15 minutes, stirring occasionally, until thick. Season generously. Toss with pasta, using reserved pasta water to reach desired consistency. Top with parmesan."},
  {id:"t03",name:"Turkey Taco Skillet",time:20,protein:40,cal:440,carbs:32,fat:14,cat:"Turkey",tags:["mexican","fast","toddler-friendly"],
   ing:[["ground turkey",1.5],["black beans",1],["corn",2],["canned tomatoes",1],["onion",1],["garlic",1],["shredded cheese",1],["taco seasoning",1]],
   steps:"Dice onion and mince garlic. Heat oil in a large skillet over medium-high heat. Add ground turkey and cook 5–6 minutes, breaking it apart until no pink remains. Add onion and cook 3 minutes. Add garlic and taco seasoning, stir 1 minute. Add drained black beans, corn kernels, and canned tomatoes with juices. Stir to combine. Simmer over medium heat 8 minutes, stirring occasionally, until most of the liquid has reduced. Season with salt. Sprinkle shredded cheese over the top, cover with a lid for 1–2 minutes until melted. Serve with sour cream and hot sauce."},
  {id:"t04",name:"Turkey Lettuce Cup Tacos",time:15,protein:36,cal:320,carbs:12,fat:14,cat:"Turkey",tags:["low-carb","fast","toddler-friendly"],
   ing:[["ground turkey",1.5],["garlic",1],["soy sauce",0.15],["hoisin sauce",0.1],["ginger",0.5],["green onions",1],["sesame oil",0.05],["red pepper flakes",0.04],["butter lettuce",1],["carrots",1],["sesame seeds",0.1]],
   steps:"Mince garlic and grate ginger. Combine soy sauce, hoisin sauce, and sesame oil in a small bowl. Shred or julienne carrots. Heat oil in a skillet over medium-high heat. Add ground turkey and cook 5–6 minutes, breaking it apart, until cooked through. Add garlic, ginger, and red pepper flakes, stir 1 minute. Pour sauce mixture over the meat and toss to coat. Cook 1–2 more minutes until sauce is absorbed. Rinse and separate large butter lettuce leaves to use as cups — pat dry. Spoon the turkey mixture into each cup. Top with shredded carrots, sliced green onions, and a sprinkle of sesame seeds."},
  {id:"t05",name:"Turkey & Sweet Potato Skillet",time:25,protein:38,cal:420,carbs:32,fat:14,cat:"Turkey",tags:["comfort","toddler-friendly","meal-prep"],
   ing:[["ground turkey",1.5],["sweet potato",2],["onion",1],["bell peppers",2],["garlic",1],["smoked paprika",0.1],["canned tomatoes",1],["shredded cheese",0.5]],
   steps:"Peel and cut sweet potato into small ½-inch cubes so they cook quickly. Dice onion and bell pepper. Heat oil in a large skillet over medium-high heat. Add sweet potato and cook 5 minutes, stirring occasionally, until starting to soften. Add onion and bell pepper, cook 3 more minutes. Push vegetables to the sides. Add ground turkey in the center and cook 5–6 minutes, breaking it apart. Mix turkey with vegetables once cooked. Add garlic and smoked paprika, stir 1 minute. Add canned tomatoes with juices. Simmer 8 minutes until sweet potato is fully tender and sauce has reduced. Sprinkle cheese on top, cover 1 minute to melt."},
  {id:"t06",name:"Turkey Meatloaf Muffins",time:30,protein:36,cal:360,carbs:16,fat:14,cat:"Turkey",tags:["meal-prep","toddler-friendly","comfort"],
   ing:[["ground turkey",1.5],["eggs",3],["breadcrumbs",0.5],["onion",1],["garlic",1],["ketchup",0.25],["worcestershire",0.1],["shredded cheese",0.5]],
   steps:"Preheat oven to 375°F. Dice onion very finely and mince garlic. Combine ground turkey, beaten eggs, breadcrumbs, diced onion, garlic, worcestershire sauce, salt, and pepper in a bowl. Mix gently until just combined — don't overwork the meat or it becomes dense. Grease a 12-cup muffin tin well. Divide the turkey mixture evenly among the cups, filling each about ¾ full. Top each with a small spoonful of ketchup and a sprinkle of shredded cheese. Bake 22–25 minutes until cooked through (165°F internal). Let cool 5 minutes in the pan before removing."},
  {id:"t07",name:"Ground Turkey Stuffed Peppers",time:30,protein:40,cal:420,carbs:30,fat:14,cat:"Turkey",tags:["comfort","toddler-friendly","meal-prep"],
   ing:[["ground turkey",1.25],["bell peppers",4],["rice",0.3],["canned tomatoes",1],["onion",1],["garlic",1],["shredded cheese",1],["italian seasoning",0.1],["tomato paste",0.5]],
   steps:"Preheat oven to 375°F. Cook rice halfway, about 8 minutes. Slice the tops off bell peppers and remove seeds. Stand them upright in a baking dish. Brown ground turkey with diced onion over medium-high heat 5 minutes, breaking it apart. Drain liquid. Add garlic, Italian seasoning, and tomato paste, stir 1 minute. Add canned tomatoes (drained) and partially cooked rice. Mix well and cook 2 minutes. Season with salt and pepper. Fill each pepper generously with the turkey-rice mixture, pressing it in. Top with shredded cheese. Pour ¼ inch of water into the bottom of the baking dish, cover tightly with foil, and bake 25 minutes. Remove foil for the last 5 minutes to brown the cheese."},
  {id:"t08",name:"Turkey Sloppy Joes",time:20,protein:36,cal:430,carbs:38,fat:12,cat:"Turkey",tags:["comfort","fast","toddler-friendly"],
   ing:[["ground turkey",1.5],["burger buns",1],["onion",1],["bell peppers",1],["canned tomatoes",1],["tomato paste",0.5],["worcestershire",0.1],["brown sugar",0.1],["garlic",1]],
   steps:"Dice onion and bell pepper. Mince garlic. Heat oil in a skillet over medium-high heat. Cook ground turkey 5–6 minutes, breaking it apart, until browned. Add onion and bell pepper, cook 4 minutes. Add garlic and tomato paste, stir 1 minute. Add canned tomatoes (crush them), worcestershire sauce, and brown sugar. Stir well and simmer over medium-low heat 10 minutes until mixture is thick and saucy. Season with salt, pepper, and a little hot sauce if desired. Toast burger buns lightly. Pile meat mixture onto buns and serve."},
  // ── EGGS & VEGGIE ──
  {id:"e01",name:"Egg & Veggie Frittata",time:25,protein:35,cal:340,carbs:10,fat:20,cat:"Eggs & Veggie",tags:["vegetarian","low-carb","meal-prep","toddler-friendly"],
   ing:[["eggs",1.5],["spinach",1],["mushrooms",1],["bell peppers",2],["feta cheese",1],["olive oil",0.1],["onion",0.5],["milk",0.1]],
   steps:"Preheat oven to 375°F. Dice bell pepper and slice mushrooms. Whisk eggs with a splash of milk, salt, and pepper in a bowl until well combined. Heat oil in a 10-inch oven-safe skillet over medium heat. Cook onion 3 minutes. Add mushrooms and bell pepper, cook 4 minutes until softened and most of the mushroom moisture has evaporated. Add spinach and stir until wilted, about 1 minute. Spread vegetables evenly in the pan. Pour whisked eggs over the top — do not stir. Scatter crumbled feta over the eggs. Cook on the stovetop 2–3 minutes until just the edges begin to set. Transfer skillet to oven and bake 12–15 minutes until the center is firm and no longer jiggles. Rest 5 minutes before slicing."},
  {id:"e02",name:"Chickpea & Spinach Curry",time:25,protein:22,cal:420,carbs:52,fat:12,cat:"Eggs & Veggie",tags:["vegetarian","indian","toddler-friendly"],
   ing:[["chickpeas",2],["spinach",1],["canned tomatoes",1],["onion",1],["garlic",1],["ginger",1],["coconut milk",1],["rice",0.4],["curry powder",0.2],["garam masala",0.1]],
   steps:"Cook rice per package directions. Dice onion and mince garlic. Grate or finely mince ginger. Heat oil in a large pot over medium heat. Cook onion 5 minutes until soft and golden. Add garlic, ginger, curry powder, and garam masala. Stir 1–2 minutes until spices are fragrant. Add canned tomatoes with juices and cook 3 minutes, crushing tomatoes as you stir. Add drained chickpeas and coconut milk. Stir to combine. Simmer over medium-low heat 12–15 minutes until sauce thickens. Add fresh spinach and stir until wilted, 1–2 minutes. Season with salt. Serve over rice."},
  {id:"e03",name:"Black Bean Quesadillas",time:15,protein:28,cal:430,carbs:46,fat:16,cat:"Eggs & Veggie",tags:["vegetarian","mexican","fast","toddler-friendly"],
   ing:[["black beans",2],["tortillas",1],["shredded cheese",1.5],["bell peppers",2],["onion",1],["salsa",1],["avocado",1],["smoked paprika",0.05]],
   steps:"Dice bell pepper and onion. Heat oil in a skillet over medium-high heat. Cook pepper and onion 4 minutes until softened. Drain and rinse black beans. Add to the pan with smoked paprika and a pinch of salt, and cook 1 minute. Lightly mash a few beans with the back of a spoon to help the filling hold together. Remove to a bowl. Wipe out the skillet and heat over medium heat. Place a tortilla in the pan. Spread cheese on half, add a scoop of bean-veggie filling, then more cheese on top. Fold tortilla in half. Cook 2–3 minutes per side, pressing gently, until golden and crispy. Slice into wedges. Serve with salsa and diced avocado."},
  {id:"e04",name:"Shakshuka",time:25,protein:24,cal:360,carbs:28,fat:18,cat:"Eggs & Veggie",tags:["vegetarian","toddler-friendly","fast"],
   ing:[["eggs",1.5],["canned tomatoes",2],["bell peppers",2],["onion",1],["garlic",1],["cumin",0.1],["smoked paprika",0.1],["feta cheese",0.5],["pita bread",1]],
   steps:"Dice onion and bell peppers. Mince garlic. Heat oil in a large, deep skillet over medium heat. Cook onion and bell pepper 5 minutes until soft. Add garlic, cumin, and smoked paprika, stir 1 minute until fragrant. Add canned tomatoes with juices, crushing them. Season with salt and pepper. Simmer 10 minutes until sauce is thick and jammy. Make wells in the sauce with a spoon and crack one egg into each well. Cover the pan with a lid. Cook over medium-low heat 6–8 minutes until the whites are fully set but yolks are still a little runny. Crumble feta over the top. Serve immediately with warm pita for scooping."},
  {id:"e05",name:"Veggie Fried Rice",time:20,protein:18,cal:420,carbs:52,fat:14,cat:"Eggs & Veggie",tags:["vegetarian","asian","fast","toddler-friendly"],
   ing:[["eggs",6],["rice",0.5],["frozen peas",0.5],["carrots",2],["onion",1],["soy sauce",0.25],["sesame oil",0.1],["garlic",1],["green onions",1]],
   steps:"Cook rice ahead of time and let it cool completely — day-old refrigerated rice fries best. Dice carrots and onion. Heat oil in a large wok or skillet over high heat. Add carrots and onion and stir-fry 3 minutes. Add garlic, stir 30 seconds. Add frozen peas and cook 1 minute. Push everything to the sides. Crack eggs into the center and scramble until just set. Add cold rice, breaking up clumps. Drizzle soy sauce and sesame oil over everything. Stir-fry together over high heat 2–3 minutes, pressing rice against the pan for some crispiness. Top with sliced green onions."},
  {id:"e06",name:"Lentil & Veggie Soup",time:30,protein:20,cal:360,carbs:48,fat:8,cat:"Eggs & Veggie",tags:["vegetarian","soup","meal-prep","toddler-friendly"],
   ing:[["lentils",1],["canned tomatoes",1],["carrots",3],["celery",3],["onion",1],["garlic",1],["chicken broth",1],["spinach",1],["cumin",0.1],["smoked paprika",0.1]],
   steps:"Dice onion, slice carrots, and slice celery. Mince garlic. Rinse lentils well in cold water. Heat oil in a large pot over medium heat. Cook onion, carrots, and celery together 5 minutes until softened. Add garlic, cumin, and smoked paprika, stir 1 minute. Add rinsed lentils, canned tomatoes with juices, and broth. Bring to a boil, then reduce to a steady simmer. Cook uncovered 22–25 minutes, stirring occasionally, until lentils are completely soft. Add more broth if it gets too thick. Stir in spinach and cook 1 minute. Season generously with salt and pepper."},
  {id:"e07",name:"Tofu & Vegetable Stir-Fry",time:20,protein:24,cal:380,carbs:28,fat:16,cat:"Eggs & Veggie",tags:["vegetarian","asian","fast"],
   ing:[["tofu extra firm",2],["broccoli",1],["bell peppers",2],["soy sauce",0.25],["sesame oil",0.1],["garlic",1],["ginger",1],["rice",0.4],["hoisin sauce",0.1]],
   steps:"Press tofu between paper towels with a heavy plate on top for 10 minutes to remove moisture. Cut into ¾-inch cubes. Cook rice per package directions. Mix together soy sauce, hoisin sauce, and sesame oil for the sauce. Cut broccoli into small florets and slice bell pepper. Heat oil in a wok or large skillet over high heat. Add tofu in a single layer and cook without touching for 4 minutes until golden on the bottom. Flip cubes and cook 3 more minutes. Remove. Stir-fry broccoli and peppers 3 minutes. Add garlic and ginger, stir 30 seconds. Return tofu, pour sauce over everything, and toss to coat. Serve over rice."},
  {id:"e08",name:"Vegetarian Chili",time:30,protein:22,cal:400,carbs:56,fat:10,cat:"Eggs & Veggie",tags:["vegetarian","comfort","meal-prep","toddler-friendly"],
   ing:[["black beans",2],["kidney beans",1],["chickpeas",1],["canned tomatoes",2],["onion",1],["bell peppers",2],["garlic",1],["tomato paste",1],["chili powder",0.2],["cumin",0.15],["corn",2]],
   steps:"Dice onion and bell peppers. Mince garlic. Heat oil in a large pot over medium heat. Cook onion and bell pepper 5 minutes until softened. Add garlic, chili powder, and cumin, stir 1 minute until fragrant. Stir in tomato paste and cook 2 minutes until it darkens slightly. Add all drained and rinsed beans, canned tomatoes with juices, and corn kernels. Stir well to combine. Bring to a boil, then reduce heat to a gentle simmer. Cook uncovered 20 minutes, stirring every few minutes, until thickened. Season generously with salt and pepper."},
  {id:"e09",name:"Caprese Flatbread Pizza",time:20,protein:22,cal:440,carbs:40,fat:20,cat:"Eggs & Veggie",tags:["vegetarian","fast","toddler-friendly"],
   ing:[["flatbread",1],["mozzarella",2],["cherry tomatoes",2],["basil",0.5],["olive oil",0.1],["balsamic vinegar",0.1],["garlic",0.5]],
   steps:"Preheat oven to 400°F. Place flatbreads on a baking sheet. Brush each with olive oil and a light rub of minced garlic. Slice or tear mozzarella into pieces and distribute over flatbreads. Halve cherry tomatoes and scatter over cheese. Season with salt, pepper, and a pinch of red pepper flakes if desired. Bake 12–14 minutes until cheese is melted and bubbling with some golden spots and edges of flatbread are crispy. Remove from oven. Immediately scatter fresh basil leaves on top and drizzle lightly with balsamic vinegar. Slice and serve right away."},
  {id:"e10",name:"Sweet Potato & Black Bean Tacos",time:20,protein:18,cal:420,carbs:60,fat:12,cat:"Eggs & Veggie",tags:["vegetarian","mexican","toddler-friendly"],
   ing:[["sweet potato",3],["black beans",2],["corn tortillas",1],["avocado",1],["lime",2],["cilantro",1],["red onion",0.5],["cumin",0.1],["smoked paprika",0.1]],
   steps:"Peel and dice sweet potato into ½-inch cubes. Toss with olive oil, cumin, smoked paprika, salt, and pepper. Heat a large skillet over medium-high heat and cook sweet potato 10–12 minutes, stirring occasionally, until golden on the outside and soft inside. Drain and rinse black beans. Add beans to the pan with the sweet potato, stir, and cook 2 minutes to warm through. Warm corn tortillas in a dry skillet one at a time, about 30 seconds per side, until pliable and lightly charred. Dice avocado and thinly slice red onion. Assemble tacos with sweet potato-bean filling, avocado, red onion, fresh cilantro, and a squeeze of lime."},
  {id:"e11",name:"Mushroom & Spinach Pasta",time:20,protein:22,cal:480,carbs:56,fat:16,cat:"Eggs & Veggie",tags:["vegetarian","italian","fast","toddler-friendly"],
   ing:[["mushrooms",2],["spinach",1],["pasta",1],["garlic",1],["olive oil",0.15],["parmesan",0.75],["lemon",1],["red pepper flakes",0.04]],
   steps:"Cook pasta per package directions until al dente. Reserve 1 cup pasta water before draining. Slice mushrooms thickly. Mince garlic. Heat olive oil in a large skillet over medium-high heat. Add mushrooms and cook 6–7 minutes without stirring much, until deeply browned. Add garlic and red pepper flakes, cook 1 minute. Add spinach and stir until wilted, about 1 minute. Add drained pasta and ½ cup pasta water to the pan. Toss together over medium heat, adding more pasta water as needed to create a light sauce. Remove from heat, stir in parmesan and a squeeze of lemon juice. Season well and serve."},
  {id:"e12",name:"Greek Veggie Bowls",time:20,protein:20,cal:440,carbs:44,fat:18,cat:"Eggs & Veggie",tags:["vegetarian","mediterranean","meal-prep"],
   ing:[["chickpeas",2],["quinoa",0.75],["cucumber",1],["cherry tomatoes",1],["red onion",0.5],["feta cheese",1],["hummus",1],["lemon",2],["kalamata olives",0.5],["smoked paprika",0.1],["olive oil",0.1]],
   steps:"Cook quinoa: rinse in a fine-mesh strainer, then combine with 1.5 cups water in a pot. Bring to a boil, cover, and simmer 15 minutes. Fluff with a fork. Drain and rinse chickpeas. Pat completely dry with paper towels. Toss with olive oil, smoked paprika, cumin, garlic powder, salt, and pepper. Spread on a sheet pan and roast at 425°F for 20 minutes, shaking halfway through, until golden and slightly crispy. Dice cucumber, halve cherry tomatoes, and thinly slice red onion. Assemble bowls: quinoa base, crispy chickpeas, cucumber, tomatoes, red onion, kalamata olives, and crumbled feta. Add a scoop of hummus and squeeze lemon over everything."},
  // ── PASTA ──
  {id:"pa01",name:"Creamy Tuscan Pasta",time:25,protein:38,cal:570,carbs:44,fat:22,cat:"Pasta",tags:["italian","comfort","toddler-friendly"],
   ing:[["chicken breast",1.25],["pasta",1],["spinach",1],["sun-dried tomatoes",1],["heavy cream",0.5],["parmesan",1],["garlic",1],["chicken broth",0.5]],
   steps:"Cook pasta per package directions until al dente. Reserve ½ cup pasta water before draining. Season chicken with salt and pepper. Heat oil in a large skillet over medium-high heat. Sear chicken 5–6 minutes per side until cooked through. Let rest 5 minutes, then slice thin. Reduce heat to medium. Add minced garlic to the same skillet and cook 1 minute. Add sun-dried tomatoes and cook 1 more minute. Pour in chicken broth and heavy cream. Stir and simmer 4 minutes until sauce starts to thicken. Stir in parmesan until melted. Add spinach and stir until wilted. Add pasta and toss, using reserved pasta water to reach a creamy consistency. Top with sliced chicken."},
  {id:"pa02",name:"Baked Ziti",time:30,protein:40,cal:560,carbs:48,fat:22,cat:"Pasta",tags:["italian","comfort","meal-prep","toddler-friendly"],
   ing:[["ground beef 90/10",1],["pasta",1],["canned tomatoes",2],["mozzarella",1],["parmesan",1],["tomato paste",1],["garlic",1],["onion",1],["italian seasoning",0.1]],
   steps:"Preheat oven to 375°F. Cook pasta until just barely al dente — it will cook more in the oven. Drain. Brown ground beef with diced onion over medium-high heat 5–6 minutes. Drain fat. Add garlic, tomato paste, Italian seasoning, and canned tomatoes. Simmer 10 minutes until thickened. Season with salt and pepper. Combine pasta and meat sauce in the pot and stir. Spread half in a greased 9×13 baking dish. Layer with half the mozzarella. Add remaining pasta on top. Cover with rest of mozzarella and all the parmesan. Bake uncovered 20 minutes until cheese is golden and bubbly. Let rest 5 minutes before scooping."},
  {id:"pa03",name:"Chicken Alfredo",time:25,protein:48,cal:600,carbs:44,fat:26,cat:"Pasta",tags:["italian","comfort","toddler-friendly"],
   ing:[["chicken breast",1.5],["pasta",1],["heavy cream",0.75],["parmesan",1],["butter",0.2],["garlic",1],["parsley",1]],
   steps:"Cook pasta per package directions. Reserve ½ cup pasta water before draining. Season chicken breasts with salt and pepper. Heat oil in a large skillet over medium-high heat. Cook chicken 5–6 minutes per side until golden and cooked through (165°F). Let rest 5 minutes and slice. In the same skillet over medium-low heat, melt butter. Add minced garlic and cook 1 minute — do not let it brown. Pour in heavy cream and bring to a gentle simmer. Cook 3–4 minutes, stirring often, until cream reduces slightly. Whisk in parmesan a handful at a time until the sauce is smooth and thick. Season with salt and pepper. Add drained pasta and toss, using pasta water to adjust consistency. Plate and top with sliced chicken and chopped parsley."},
  {id:"pa04",name:"One-Pot Pasta e Fagioli",time:30,protein:30,cal:480,carbs:56,fat:12,cat:"Pasta",tags:["italian","comfort","meal-prep","toddler-friendly"],
   ing:[["white beans",2],["pasta",0.5],["canned tomatoes",1],["chicken broth",1],["onion",1],["carrots",2],["celery",2],["garlic",1],["parmesan",0.5],["italian seasoning",0.1]],
   steps:"Dice onion, carrots, and celery into small pieces. Mince garlic. Heat olive oil in a large pot over medium heat. Cook onion, carrots, and celery together 5 minutes until soft. Add garlic and Italian seasoning, stir 1 minute. Add canned tomatoes and cook 2 minutes, crushing them. Add drained white beans and broth. Bring to a boil. Add dry pasta directly into the pot, reduce heat to medium, and cook uncovered 10–12 minutes, stirring frequently, until pasta is tender. The starch from the pasta will thicken the soup naturally. If it gets too thick, add a little water. Season generously with salt and pepper. Serve with parmesan grated over the top."},
  {id:"pa05",name:"Lemon Ricotta Pasta",time:20,protein:30,cal:520,carbs:52,fat:18,cat:"Pasta",tags:["vegetarian","italian","fast","toddler-friendly"],
   ing:[["pasta",1],["ricotta",1],["lemon",2],["parmesan",0.75],["garlic",1],["spinach",1],["olive oil",0.15],["red pepper flakes",0.04]],
   steps:"Cook pasta per package directions. Reserve 1 cup pasta water — you'll need it for the sauce. Mince garlic. While pasta cooks, combine ricotta, grated parmesan, lemon zest, lemon juice, salt, and pepper in a bowl and stir until smooth. Heat olive oil in a large skillet over medium heat. Add garlic and red pepper flakes, cook 1 minute without browning. Add spinach and toss until wilted, 1 minute. Add drained pasta to the skillet. Add ricotta mixture and ¼ cup pasta water. Toss vigorously over medium-low heat until pasta is coated in a creamy sauce, adding more pasta water splash by splash until it reaches the right consistency. Taste, adjust seasoning and lemon, and serve."},
  {id:"pa06",name:"Pesto Pasta with Chicken",time:20,protein:44,cal:560,carbs:44,fat:22,cat:"Pasta",tags:["italian","fast","toddler-friendly"],
   ing:[["chicken breast",1.5],["pasta",1],["basil",1],["parmesan",0.75],["pine nuts",0.25],["garlic",1],["olive oil",0.2],["cherry tomatoes",1]],
   steps:"Cook pasta per package directions. While it cooks, make pesto: blend fresh basil, parmesan, pine nuts, 1 garlic clove, and olive oil in a blender or food processor until smooth. Season with salt and pepper. Season chicken with salt and pepper. Cook in an oiled skillet over medium-high heat 5–6 minutes per side until golden and cooked through. Rest 5 minutes then slice. Halve cherry tomatoes. Drain pasta, reserving ½ cup pasta water. Toss pasta with pesto, adding pasta water to loosen. Add cherry tomatoes and toss. Plate pasta topped with sliced chicken and extra parmesan if desired."},

function filt(meals,f){return meals.filter(m=>{if(f.excludeCats&&f.excludeCats.includes(m.cat))return false;if(f.noSweetAsian&&m.tags.includes("sweet-asian"))return false;if(f.noFish&&(m.tags.includes("fish")||m.tags.includes("seafood")))return false;if(f.maxTime&&m.time>f.maxTime)return false;if(f.minProtein&&m.protein<f.minProtein)return false;if(f.lowCarb&&!m.tags.includes("low-carb"))return false;if(f.vegetarian&&!m.tags.includes("vegetarian"))return false;return true;});}
function mealCost(meal,sv){const sc=sv/4;return meal.ing.reduce((s,[i,q])=>s+gp(i,q*sc),0);}
function ws(pool,cnt){if(pool.length<=cnt)return[...pool];const w=pool.map(m=>Math.max(.5,(m.rating||1)**2.2));const sel=[],used=new Set();let t=0;while(sel.length<cnt&&t<800){t++;const tot=w.reduce((a,b)=>a+b,0);let r=Math.random()*tot;for(let i=0;i<pool.length;i++){r-=w[i];if(r<=0&&!used.has(pool[i].id)){sel.push({...pool[i]});used.add(pool[i].id);break;}}}return sel;}
function genPlan(db,f,cnt){const pinned=db.filter(m=>m.pinned).slice(0,cnt);const pids=new Set(pinned.map(m=>m.id));const pool=filt(db.filter(m=>!m.snoozedUntil||Date.now()>m.snoozedUntil),f).filter(m=>!pids.has(m.id));return[...pinned,...ws(pool,cnt-pinned.length)].slice(0,cnt);}

function encPlan(meals,sv,extras,gen){
  const s={v:sv,g:gen,e:(extras||[]).map(e=>({n:e.name,q:e.qty,z:e.zone,nt:e.note})),m:meals.map(m=>({n:m.name,c:m.cat,t:m.time,p:m.protein,k:m.cal,b:m.carbs,f:m.fat,s:m.steps,i:m.ing,td:m.tags&&m.tags.includes("toddler-friendly")?1:0}))};
  return btoa(unescape(encodeURIComponent(JSON.stringify(s)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function decPlan(raw){
  const b64=raw.replace(/-/g,'+').replace(/_/g,'/'),padded=b64+('==='.slice((b64.length+3)%4||4));
  const d=JSON.parse(decodeURIComponent(escape(atob(padded))));
  if(d.m)return{servings:d.v,generated:d.g,extras:(d.e||[]).map(e=>({name:e.n,qty:e.q,zone:e.z,note:e.nt})),meals:d.m.map(m=>({name:m.n,cat:m.c,time:m.t,protein:m.p,cal:m.k,carbs:m.b,fat:m.f,steps:m.s,ing:m.i,tags:m.td?["toddler-friendly"]:[]}))};
  return d;
}

function CookMode({meal,sv,onClose}){
  const [doneSteps,setDs]=useState(new Set());
  const sc=sv/4;
  const steps=meal.steps.split(/\.\s+(?=[A-Z])/).filter(s=>s.trim().length>2);
  return(
    <div className="cook-screen">
      <div className="cook-hdr">
        <div><div style={{fontSize:".7rem",opacity:.7,textTransform:"uppercase",letterSpacing:".6px"}}>{meal.cat}</div><div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.1rem"}}>{meal.name}</div></div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.3)",color:"#fff",borderRadius:20,padding:"6px 14px",fontWeight:700,fontSize:".78rem"}}>✕ Done</button>
      </div>

          <div style={{fontWeight:700,fontSize:".78rem",opacity:.7,textTransform:"uppercase",letterSpacing:".5px",marginBottom:8}}>Ingredients ({sv} servings)</div>
          {meal.ing.map(([item,qty])=>{const sq=qty*sc;return<div key={item} className="cook-ing-row"><span>{fq(item,sq)}{item}</span></div>;})}
        </div>
        <div style={{fontWeight:700,fontSize:".78rem",opacity:.7,textTransform:"uppercase",letterSpacing:".5px",marginBottom:10}}>Steps ({steps.length})</div>
        {steps.map((step,i)=>(
          <div key={i} className={`cook-step${doneSteps.has(i)?" done":""}`} onClick={()=>setDs(p=>{const n=new Set(p);n.has(i)?n.delete(i):n.add(i);return n;})}>
            <div className="cook-num">{i+1}</div>
            <div style={{flex:1}}>{step.trim()}{step.trim().endsWith(".")?"":" ."}</div>
          </div>
        ))}
        <div style={{textAlign:"center",marginTop:20,fontSize:".8rem",opacity:.6}}>{doneSteps.size}/{steps.length} steps done</div>
      </div>
    </div>
  );
}
