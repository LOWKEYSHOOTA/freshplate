<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FreshPlate 🌿</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#F7F4EE;--surface:#FFFFFF;--green:#1E4D2B;--green2:#2D6A3F;--green3:#4A8C5C;--terra:#C4622D;--terra2:#E07A45;--gold:#B8963E;--gold2:#D4AE5A;--text:#1A1A1A;--muted:#6B6357;--border:#DDD7CC;--cs:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.08);--csh:0 4px 8px rgba(0,0,0,0.08),0 12px 32px rgba(0,0,0,0.13);--r:14px}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    h1,h2,h3{font-family:'Playfair Display',serif}
    input,button,select,textarea{font-family:'DM Sans',sans-serif}
    .nav{background:var(--green);height:auto;min-height:56px;padding:8px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,0.22)}
    .brand{font-family:'Playfair Display',serif;font-size:1.35rem;color:white;display:flex;align-items:center;gap:8px;flex-shrink:0}
    .brand span{font-size:0.68rem;background:rgba(255,255,255,0.18);border-radius:10px;padding:2px 8px;font-family:'DM Sans',sans-serif;font-weight:700;letter-spacing:.5px}
    .nav-tabs{display:flex;gap:4px;flex-wrap:wrap}
    .ntab{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.85);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:0.8rem;font-weight:500;transition:all .15s}
    .ntab:hover{background:rgba(255,255,255,0.2)}
    .ntab.on{background:var(--terra);border-color:var(--terra);color:white;font-weight:700}
    .wrap{max-width:1180px;margin:0 auto;padding:28px 20px 80px}
    .page-title{font-family:'Playfair Display',serif;font-size:1.85rem;color:var(--green);line-height:1.15}
    .page-sub{color:var(--muted);font-size:0.87rem;margin-top:3px;margin-bottom:20px}
    .filter-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
    .fp-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
    .fp-title{font-weight:700;font-size:0.85rem;color:var(--green);display:flex;align-items:center;gap:6px}
    .fp-badge{background:var(--terra);color:white;border-radius:10px;padding:1px 7px;font-size:0.68rem;font-weight:700}
    .fp-body{margin-top:14px;display:flex;flex-direction:column;gap:14px}
    .fp-section{font-size:0.7rem;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:-2px}
    .fp-toggle{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
    .fp-toggle input[type=checkbox]{width:15px;height:15px;accent-color:var(--green);cursor:pointer}
    .fp-toggle-lbl{font-size:0.8rem;font-weight:500}
    .fp-slider-wrap{display:flex;align-items:center;gap:10px;flex:1;min-width:200px}
    .fp-slider-lbl{font-size:0.78rem;font-weight:600;white-space:nowrap;min-width:140px}
    .fp-slider{flex:1;accent-color:var(--green);cursor:pointer}
    .fp-slider-val{font-size:0.78rem;font-weight:700;color:var(--green);min-width:36px;text-align:right}
    .cat-chips{display:flex;flex-wrap:wrap;gap:6px}
    .cchip{border:1.5px solid var(--border);border-radius:12px;padding:4px 11px;font-size:0.75rem;font-weight:700;cursor:pointer;transition:all .13s;background:white;color:var(--text)}
    .cchip.excluded{background:#FFEBEE;color:#C0392B;border-color:#C0392B}
    .cchip.included{background:#E8F5E9;color:var(--green);border-color:var(--green)}
    .fp-reset{border:none;background:none;color:var(--muted);font-size:0.76rem;font-weight:700;cursor:pointer;text-decoration:underline;padding:0}
    .controls{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 18px;margin-bottom:18px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
    .ctrl{display:flex;align-items:center;gap:8px}
    .ctrl-lbl{font-size:0.72rem;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted)}
    .num-ctrl{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
    .num-btn{width:32px;height:32px;border:none;background:#F2EFE9;color:var(--text);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .num-val{width:36px;text-align:center;font-size:0.9rem;font-weight:700;border:none;border-left:1.5px solid var(--border);border-right:1.5px solid var(--border);padding:6px 0;color:var(--green);background:white;outline:none}
    .regen{background:var(--terra);color:white;border:none;padding:8px 20px;border-radius:20px;font-weight:700;font-size:0.83rem;cursor:pointer;transition:all .15s}
    .regen:hover{background:var(--terra2);transform:translateY(-1px)}
    .meal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:18px;margin-bottom:26px}
    .mcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--cs);transition:box-shadow .2s,transform .2s;display:flex;flex-direction:column}
    .mcard:hover{box-shadow:var(--csh);transform:translateY(-2px)}
    .mcard.pinned{border:2px solid var(--gold)}
    .mcard.snoozed{opacity:0.55;border:1px dashed var(--border)}
    .mcard-top{background:linear-gradient(135deg,var(--green) 0%,var(--green2) 60%,var(--green3) 100%);padding:16px 16px 12px;color:white}
    .mcard-top-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2px}
    .mcard-badge{background:rgba(255,255,255,0.18);border-radius:12px;padding:2px 8px;font-size:0.7rem;font-weight:700}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:1rem;line-height:1;padding:2px;opacity:0.8;transition:transform .15s}
    .icon-btn:hover{transform:scale(1.2);opacity:1}
    .mcard-cat{font-size:0.65rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;opacity:.7;margin-bottom:3px}
    .mcard-name{font-family:'Playfair Display',serif;font-size:1.05rem;line-height:1.25;margin-bottom:4px}
    .mcard-meta{font-size:0.76rem;opacity:.88;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .density-row{display:flex;gap:8px;font-size:0.72rem;opacity:.88;margin-top:4px;flex-wrap:wrap}
    .density-pill{background:rgba(255,255,255,0.18);border-radius:8px;padding:2px 7px;font-weight:700}
    .mcard-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
    .mtag{background:rgba(255,255,255,0.16);border-radius:10px;padding:2px 7px;font-size:0.66rem;font-weight:700}
    .mcard-body{padding:13px 15px;flex:1;display:flex;flex-direction:column;gap:9px}
    .mcard-steps{font-size:0.82rem;color:var(--muted);line-height:1.55}
    .macro-bar{background:#F4FAF6;border-radius:9px;padding:9px 11px}
    .macro-bar-title{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:7px}
    .macro-row{display:flex;gap:8px}
    .macro-item{flex:1;text-align:center}
    .macro-val{font-size:0.95rem;font-weight:700}
    .macro-lbl{font-size:0.62rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
    .macro-bar-bg{height:4px;border-radius:2px;background:#DDD;margin-top:4px;overflow:hidden}
    .macro-bar-fill{height:4px;border-radius:2px}
    .ing-toggle{background:none;border:none;cursor:pointer;font-size:0.73rem;font-weight:700;color:var(--green);display:flex;align-items:center;gap:4px;padding:0}
    .ing-row{display:flex;justify-content:space-between;font-size:0.78rem;padding:2px 0;border-bottom:1px solid #F3EFE8}
    .ing-price{color:var(--green);font-weight:700;font-size:0.76rem}
    .store-row{display:flex;gap:7px}
    .schip{flex:1;border:1.5px solid var(--border);border-radius:9px;padding:7px 9px;text-align:center}
    .schip.best{border-color:var(--gold);background:#FDFBF3}
    .schip-name{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
    .schip-price{font-size:0.95rem;font-weight:700;color:var(--green);margin-top:1px}
    .schip-badge{font-size:0.62rem;font-weight:700;color:var(--terra);margin-top:1px}
    .rating-wrap{border-top:1px solid var(--border);padding-top:9px}
    .rating-lbl{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px}
    .stars{display:flex;gap:4px}
    .star{font-size:1.3rem;cursor:pointer;transition:transform .1s;color:#D5CFC5;line-height:1}
    .star.on{color:var(--gold2)}
    .star:hover{transform:scale(1.2)}
    .fb-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
    .fbchip{border:1.5px solid var(--border);border-radius:12px;padding:3px 9px;font-size:0.7rem;font-weight:700;cursor:pointer;transition:all .13s;background:white;color:var(--muted)}
    .fbchip.li{background:var(--green);color:white;border-color:var(--green)}
    .fbchip.di{background:#C0392B;color:white;border-color:#C0392B}
    .card-acts{display:flex;gap:6px;margin-top:2px}
    .cact{flex:1;border:1.5px solid var(--border);background:white;border-radius:8px;padding:6px;font-size:0.73rem;font-weight:700;cursor:pointer;transition:all .13s;color:var(--text)}
    .cact:hover{border-color:var(--green);color:var(--green);background:#F2FAF4}
    .summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;box-shadow:var(--cs)}
    .sum-title{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--green);margin-bottom:14px}
    .store-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    .scard{border:2px solid var(--border);border-radius:11px;padding:14px 16px;position:relative}
    .scard.win{border-color:var(--gold);background:#FDFBF5}
    .win-badge{position:absolute;top:-9px;right:11px;background:var(--gold);color:white;font-size:0.62rem;font-weight:700;padding:2px 8px;border-radius:7px;letter-spacing:.5px;text-transform:uppercase}
    .scard-name{font-weight:700;font-size:0.92rem;margin-bottom:1px}
    .scard-addr{font-size:0.7rem;color:var(--muted);margin-bottom:8px}
    .scard-total{font-size:1.75rem;font-weight:700;color:var(--green)}
    .scard-sub{font-size:0.7rem;color:var(--muted);margin-top:2px}
    .save-note{font-size:0.83rem;color:var(--muted)}
    .nut-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}
    .nut-box{background:#F4FAF6;border-radius:10px;padding:10px;text-align:center}
    .nut-val{font-size:1.3rem;font-weight:700;color:var(--green)}
    .nut-lbl{font-size:0.65rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
    .ai-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--cs);margin-bottom:20px}
    .ai-title{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--green);margin-bottom:3px}
    .ai-sub{font-size:0.8rem;color:var(--muted);margin-bottom:10px}
    .ai-row{display:flex;gap:7px}
    .ai-in{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:0.86rem;outline:none}
    .ai-in:focus{border-color:var(--green)}
    .ai-go{background:var(--green);color:white;border:none;padding:8px 16px;border-radius:8px;font-weight:700;font-size:0.83rem;cursor:pointer}
    .ai-go:disabled{opacity:.5;cursor:not-allowed}
    .ai-resp{margin-top:10px;background:#F4FAF6;border:1px solid #C5DECA;border-radius:8px;padding:11px 13px;font-size:0.83rem;line-height:1.6;white-space:pre-wrap}
    .taste-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-top:14px}
    .tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--cs)}
    .tcard-name{font-family:'Playfair Display',serif;font-size:0.9rem;margin-bottom:3px}
    .tcard-stars{color:var(--gold2);font-size:0.82rem;font-weight:700;margin-bottom:6px}
    .t-like{background:#E8F5E9;color:#1E4D2B;border-radius:9px;padding:2px 8px;font-size:0.68rem;font-weight:700;display:inline-block;margin:2px}
    .t-dis{background:#FFEBEE;color:#C0392B;border-radius:9px;padding:2px 8px;font-size:0.68rem;font-weight:700;display:inline-block;margin:2px}
    .ing-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--cs)}
    .ing-thead th{background:var(--green);color:white;padding:9px 13px;font-size:0.72rem;font-weight:700;letter-spacing:.4px;text-transform:uppercase;text-align:left}
    .ing-tbody tr:nth-child(odd){background:#FAFAF8}
    .ing-tbody td{padding:8px 13px;font-size:0.82rem;border-bottom:1px solid var(--border)}
    .ing-best{color:var(--terra);font-weight:700}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal{background:var(--surface);border-radius:var(--r);padding:24px 26px;max-width:580px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.22)}
    .modal-title{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--green);margin-bottom:16px}
    .form-row{margin-bottom:12px}
    .form-lbl{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px;display:block}
    .form-in{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 11px;font-size:0.86rem;outline:none;background:white}
    .form-in:focus{border-color:var(--green)}
    .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .form-textarea{resize:vertical;min-height:72px}
    .modal-acts{display:flex;gap:8px;margin-top:16px}
    .btn-primary{flex:1;background:var(--green);color:white;border:none;padding:10px;border-radius:9px;font-weight:700;font-size:0.86rem;cursor:pointer}
    .btn-cancel{background:none;border:1.5px solid var(--border);padding:10px 16px;border-radius:9px;font-weight:700;font-size:0.86rem;cursor:pointer;color:var(--muted)}
    .add-meal-btn{background:var(--green);color:white;border:none;padding:8px 18px;border-radius:20px;font-weight:700;font-size:0.82rem;cursor:pointer}
    .export-btn{background:var(--gold);color:white;border:none;padding:8px 16px;border-radius:20px;font-weight:700;font-size:0.78rem;cursor:pointer}
    .ai-recipe-btn{background:linear-gradient(135deg,var(--green),var(--green2));color:white;border:none;padding:9px 18px;border-radius:20px;font-weight:700;font-size:0.82rem;cursor:pointer}
    /* ── MOBILE ── */
    @media(max-width:768px){
      .nav{padding:8px 12px}
      .brand{font-size:1.1rem}
      .brand span{display:none}
      .nav-tabs{width:100%;justify-content:space-between}
      .ntab{padding:5px 8px;font-size:0.72rem;flex:1;text-align:center}
      .wrap{padding:12px 10px 80px}
      .page-title{font-size:1.4rem}
      .store-grid{grid-template-columns:1fr}
      .meal-grid{grid-template-columns:1fr}
      .nut-grid{grid-template-columns:1fr 1fr}
      .controls{gap:8px;padding:10px 12px}
      .fp-slider-wrap{flex-direction:column;align-items:flex-start;gap:4px;min-width:unset}
      .fp-slider{width:100%}
      .fp-slider-lbl{min-width:unset}
      .cat-chips{gap:5px}
      .cchip{font-size:0.7rem;padding:3px 9px}
      .mcard-name{font-size:0.95rem}
      .macro-row{gap:4px}
      .macro-val{font-size:0.85rem}
      .density-row{gap:4px}
      .density-pill{font-size:0.66rem}
      .store-row{gap:5px}
      .schip{padding:6px 7px}
      .schip-price{font-size:0.85rem}
      .card-acts{gap:4px}
      .cact{font-size:0.68rem;padding:5px}
      .summary{padding:14px}
      .scard-total{font-size:1.4rem}
      .ing-thead th{padding:7px 8px;font-size:0.65rem}
      .ing-tbody td{padding:6px 8px;font-size:0.76rem}
      .modal{padding:18px 14px;max-height:95vh}
      .taste-grid{grid-template-columns:1fr}
      .fb-chips{gap:3px}
      .fbchip{font-size:0.65rem;padding:2px 7px}
      .fp-body{gap:10px}
    }
    @media(max-width:400px){
      .ntab{font-size:0.66rem;padding:4px 6px}
      .mcard-body{padding:10px 11px}
      .mcard-top{padding:12px 12px 10px}
    }
    /* shared plan view */
    .sp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:28px}
    @media(max-width:600px){
      .sp-grid{grid-template-columns:1fr}
      .sp-nav{flex-direction:column !important;align-items:flex-start !important;gap:4px !important;padding:12px 16px !important}
      .sp-wrap{padding:16px 12px 60px !important}
      .sp-h1{font-size:1.3rem !important}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;

const UNIT_SCALE={
  "lb":1,"oz":16,"cup":4,"tbsp":16,"tsp":48,"clove":8,
  "can":1,"bunch":1,"stalk":4,"ear":1,"inch":3,"head":1,"slice":4,""  :1

function fmtQty(item,rawQty){
  const unit=UNIT_MAP[item];
  if(unit===undefined){
    // fallback: just show number
    return rawQty%1===0?rawQty+"":rawQty.toFixed(1)+"";
  }
  const scale=UNIT_SCALE[unit]||1;
  const scaled=rawQty*scale;
  // Round to sensible numbers
  const nice=scaled<1?Math.round(scaled*4)/4:scaled<=4?Math.round(scaled*2)/2:Math.round(scaled);
  const qty=nice%1===0?nice:nice.toFixed(nice<2?2:1);
  if(unit==="")return qty+" ";
  // pluralize simple units
  const pl=nice!==1&&["oz","lb","cup","clove","stalk","ear","inch","slice"].includes(unit)?unit+"s":unit;
  return qty+" "+pl+" ";
}

function filt(meals,f){return meals.filter(m=>{if(f.excludeCats&&f.excludeCats.includes(m.cat))return false;if(f.noSweetAsian&&m.tags.includes("sweet-asian"))return false;if(f.noFish&&(m.tags.includes("fish")||m.tags.includes("seafood")))return false;if(f.maxTime&&m.time>f.maxTime)return false;if(f.minProtein&&m.protein<f.minProtein)return false;if(f.lowCarb&&!m.tags.includes("low-carb"))return false;if(f.vegetarian&&!m.tags.includes("vegetarian"))return false;return true;});}
function mc(meal,frys,sv){const sc=sv/4;return meal.ing.reduce((s,[item,qty])=>s+gp(item,frys,qty*sc),0);}
function ws(pool,count){if(pool.length<=count)return[...pool];const w=pool.map(m=>Math.max(0.5,(m.rating||1)**2.2));const sel=[];const used=new Set();let t=0;while(sel.length<count&&t<800){t++;const tot=w.reduce((a,b)=>a+b,0);let r=Math.random()*tot;for(let i=0;i<pool.length;i++){r-=w[i];if(r<=0&&!used.has(pool[i].id)){sel.push({...pool[i]});used.add(pool[i].id);break;}}}return sel;}
function genPlan(db,f,cnt){const pinned=db.filter(m=>m.pinned).slice(0,cnt);const pids=new Set(pinned.map(m=>m.id));const pool=filt(db.filter(m=>!m.snoozedUntil||Date.now()>m.snoozedUntil),f).filter(m=>!pids.has(m.id));return[...pinned,...ws(pool,cnt-pinned.length)].slice(0,cnt);}

function encPlan(payload){
  // Only keep fields needed for shared view — strip everything else
  const slim={
    v:sv,
    g:payload.generated,
    e:payload.extras&&payload.extras.length?payload.extras.map(e=>({n:e.name,q:e.qty,z:e.zone,nt:e.note})):[],
    m:payload.meals.map(m=>({
      n:m.name,c:m.cat,t:m.time,p:m.protein,k:m.cal,b:m.carbs,f:m.fat,
      s:m.steps,i:m.ing,tg:m.tags&&m.tags.includes("toddler-friendly")?1:0
    }))
  };
  const json=JSON.stringify(slim);
  return btoa(unescape(encodeURIComponent(json))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function decPlan(raw){
  const b64=raw.replace(/-/g,'+').replace(/_/g,'/');
  const padded=b64+('==='.slice((b64.length+3)%4||4));
  const d=JSON.parse(decodeURIComponent(escape(atob(padded))));
  // Support both new slim format and old format
  if(d.m){
    return{
      servings:d.v,generated:d.g,
      extras:(d.e||[]).map(e=>({name:e.n,qty:e.q,zone:e.z,note:e.nt})),
      meals:d.m.map(m=>({name:m.n,cat:m.c,time:m.t,protein:m.p,cal:m.k,carbs:m.b,fat:m.f,steps:m.s,ing:m.i,tags:m.tg?["family-friendly","toddler-friendly"]:["family-friendly"]}))
    };
  }
  return d;
}

                  {ckCnt>0&&<button onClick={()=>{setCkShop({});persist({ckShop:{}}); }} style={{background:"none",border:"none",fontSize:"0.72rem",color:"var(--muted)",cursor:"pointer",textDecoration:"underline",padding:0}}>Clear</button>}
                </div>
                <button onClick={()=>{const name=prompt("Item name:");if(!name||!name.trim())return;const qty=prompt("Quantity:")||"1";const note=prompt("Note (optional):")||"";const zone=gz(name.toLowerCase().trim());setExtras(prev=>{const n=[...prev,{id:Date.now(),name:name.trim(),qty,note,zone}];persist({extras:n});return n;});}} style={{background:"var(--terra)",color:"white",border:"none",borderRadius:16,padding:"6px 16px",fontWeight:700,fontSize:"0.78rem",cursor:"pointer"}}>+ Add Item</button>
              </div>
            </div>
            <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--r)",padding:"12px 16px",marginBottom:14,fontSize:"0.76rem"}}>
              <div style={{fontWeight:700,color:"var(--green)",marginBottom:6}}>🗺 Fry's Silverbell & Cortaro — Shop right → left</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{zShow.map((z,i)=><span key={z.z} style={{background:z.c,borderRadius:10,padding:"2px 9px",fontWeight:700,fontSize:"0.68rem"}}>{i+1}. {z.z}</span>)}</div>
            </div>
            {zShow.map(z=>{
              const items=grpd[z.o]||[];
              const zCk=items.filter(({item,isExtra,eid})=>ckShop[isExtra?'ex_'+eid:item]).length;
              return(
                <div key={z.z} style={{marginBottom:12,border:"1.5px solid",borderColor:z.c,borderRadius:"var(--r)",overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
                  <div style={{background:z.c,padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <span style={{fontWeight:700,fontSize:"0.86rem"}}>{z.z}</span>
                    <span style={{fontSize:"0.78rem",fontWeight:700,color:"var(--green)"}}>{zCk}/{items.length}</span>
                  </div>
                  <div className="ing-table" style={{borderRadius:0,border:"none",boxShadow:"none"}}>
                    <table style={{width:"100%",borderCollapse:"collapse"}}>
                      <thead className="ing-thead"><tr><th>Item</th><th>Qty</th><th>Fry's</th><th>Safeway</th><th>Best</th></tr></thead>
                      <tbody className="ing-tbody">
                        {items.map(({item,qty,isExtra,eid,note})=>{
                          const key=isExtra?'ex_'+eid:item;
                          const done=!!ckShop[key];
                          const fp=isExtra?null:gp(item,true,qty);
                          const sp=isExtra?null:gp(item,false,qty);
                          const q=typeof qty==="number"?qty:parseFloat(qty)||1;
                          return(
                            <tr key={key} style={{opacity:done?0.45:1,background:done?"#F0F4F0":undefined}}>
                              <td style={{fontWeight:600}}>
                                <div style={{display:"flex",alignItems:"center",gap:8}}>
                                  <input type="checkbox" checked={done} onChange={()=>tkShop(key)} style={{accentColor:"var(--green)",width:16,height:16,cursor:"pointer",flexShrink:0}}/>
                                  <span style={{textDecoration:done?"line-through":"none",flex:1}}>{isExtra&&"➕ "}{item}{note&&<span style={{marginLeft:5,fontSize:"0.68rem",color:"var(--muted)",fontStyle:"italic"}}>{note}</span>}</span>
                                  {isExtra&&<button onClick={()=>{setExtras(prev=>{const n=prev.filter(e=>e.id!==eid);persist({extras:n});return n;});}} style={{background:"none",border:"none",color:"#C0392B",cursor:"pointer",fontSize:"0.8rem"}}>✕</button>}
                                </div>
                              </td>
                              <td style={{fontWeight:700,color:done?"var(--muted)":"var(--green)"}}>{q%1===0?q:q.toFixed(2)}{!isExtra&&<span style={{fontSize:"0.65rem",color:"var(--muted)",fontWeight:400,marginLeft:2}}>u</span>}</td>
                              {!isExtra?<>
                                <td style={{color:done?"var(--muted)":undefined}}>${fp.toFixed(2)}</td>
                                <td style={{color:done?"var(--muted)":undefined}}>${sp.toFixed(2)}</td>
                                <td className="ing-best" style={{color:done?"var(--muted)":undefined}}>{fp<=sp?"Fry's":"Safeway"} (${Math.min(fp,sp).toFixed(2)})</td>
                              </>:<td colSpan={3} style={{color:"var(--muted)",fontSize:"0.78rem"}}>manual add</td>}
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              );
            })}
          </div>}
        </div>}

        {tab==="library"&&<div>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:20}}>
            <div><h1 className="page-title">Meal Library</h1><p className="page-sub">{db.length} total · {db.filter(m=>m.custom).length} custom</p></div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button className="ai-recipe-btn" onClick={()=>setShowAiR(true)}>🤖 Describe a Recipe</button>
              <button className="add-meal-btn" onClick={()=>setShowAdd(true)}>＋ Add Manually</button>
            </div>
          </div>
          <div className="meal-grid">{db.map(meal=>{
            const dm=db.find(m=>m.id===meal.id)||meal;
            const inW=week.find(m=>m.id===meal.id);
            return(
              <div key={meal.id} className={"mcard"+(dm.pinned?" pinned":"")}>
                <div className="mcard-top">
                  <div className="mcard-top-row">
                    <div className="mcard-badge">⏱ {meal.time}m</div>
                    <div style={{display:"flex",gap:4,alignItems:"center"}}>
                      {inW&&<span style={{fontSize:"0.68rem",background:"rgba(255,255,255,0.25)",borderRadius:8,padding:"2px 7px",fontWeight:700}}>this week</span>}
                      <button className="icon-btn" onClick={()=>pin(meal.id)}>{dm.pinned?"📌":"🖇️"}</button>
                    </div>
                  </div>
                  <div className="mcard-cat">{meal.cat}</div>
                  <div className="mcard-name">{meal.name}</div>
                  <div className="mcard-meta">
                    <span>{meal.protein}g prot · {meal.cal} cal · {meal.time}min</span>
                    {meal.tags&&meal.tags.includes("toddler-friendly")&&<span style={{background:"rgba(255,220,60,0.35)",border:"1px solid rgba(255,200,0,0.5)",borderRadius:20,padding:"1px 7px",fontSize:"0.66rem",fontWeight:700}}>👶 toddler ok</span>}
                  </div>
                  <div className="mcard-tags">{meal.tags&&meal.tags.filter(t=>t!=="sweet-asian"&&t!=="toddler-friendly").slice(0,3).map(t=><span key={t} className="mtag">{t}</span>)}</div>
                </div>
                <div className="mcard-body">
                  <p className="mcard-steps">{meal.steps}</p>
                  {dm.rating>0&&<div style={{color:"var(--gold2)",fontSize:"0.9rem",fontWeight:700}}>{"★".repeat(Math.round(dm.rating))}{"☆".repeat(5-Math.round(dm.rating))} {dm.rating.toFixed(1)}</div>}
                </div>
              </div>
            );
          })}</div>
        </div>}
      </div>

      {shareUrl&&<div className="modal-overlay" onClick={e=>e.target.className==="modal-overlay"&&setShareUrl(null)}>
        <div className="modal" style={{maxWidth:500}}>
          <div className="modal-title">🔗 Share This Week</div>
          <p style={{fontSize:"0.83rem",color:"var(--muted)",lineHeight:1.6,marginBottom:14}}>Send this to anyone — they'll see all {week.length} meals + shopping list by Fry's zone. No login needed.</p>
          <div style={{background:"#F4FAF6",border:"1px solid #C5DECA",borderRadius:9,padding:"10px 12px",fontSize:"0.75rem",wordBreak:"break-all",color:"#1E4D2B",marginBottom:12,lineHeight:1.5}}>{shareUrl}</div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn-primary" onClick={copyUrl} style={{background:copied?"#2D6A3F":"var(--green)"}}>{copied?"✓ Copied!":"📋 Copy Link"}</button>
            <button className="btn-cancel" onClick={()=>setShareUrl(null)}>Close</button>
          </div>
        </div>
      </div>}

      {showAdd&&<div className="modal-overlay" onClick={e=>e.target.className==="modal-overlay"&&setShowAdd(false)}>
        <div className="modal">
          <div className="modal-title">＋ Add Meal Manually</div>
          <div className="form-row"><label className="form-lbl">Meal Name *</label><input className="form-in" value={addF.name} onChange={e=>setAddF(f=>({...f,name:e.target.value}))} placeholder="e.g. Mom's Chicken Soup"/></div>
          <div className="form-row"><label className="form-lbl">Category</label><select className="form-in" value={addF.cat} onChange={e=>setAddF(f=>({...f,cat:e.target.value}))}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
          <div className="form-row form-row-2"><div><label className="form-lbl">Cook Time (min)</label><input className="form-in" type="number" value={addF.time} onChange={e=>setAddF(f=>({...f,time:e.target.value}))}/></div><div><label className="form-lbl">Protein (g/4 servings)</label><input className="form-in" type="number" value={addF.protein} onChange={e=>setAddF(f=>({...f,protein:e.target.value}))}/></div></div>
          <div className="form-row" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}><div><label className="form-lbl">Calories</label><input className="form-in" type="number" value={addF.cal} onChange={e=>setAddF(f=>({...f,cal:e.target.value}))}/></div><div><label className="form-lbl">Carbs (g)</label><input className="form-in" type="number" value={addF.carbs} onChange={e=>setAddF(f=>({...f,carbs:e.target.value}))}/></div><div><label className="form-lbl">Fat (g)</label><input className="form-in" type="number" value={addF.fat} onChange={e=>setAddF(f=>({...f,fat:e.target.value}))}/></div></div>
          <div className="form-row"><label className="form-lbl">Ingredients (one per line: "item, qty")</label><textarea className="form-in form-textarea" placeholder={"chicken breast, 1.5\nrice, 0.4\ngarlic, 1"} value={addF.ing} onChange={e=>setAddF(f=>({...f,ing:e.target.value}))}/></div>
          <div className="form-row"><label className="form-lbl">Instructions</label><textarea className="form-in form-textarea" value={addF.steps} onChange={e=>setAddF(f=>({...f,steps:e.target.value}))} placeholder="How to make it..."/></div>
          <div className="modal-acts"><button className="btn-cancel" onClick={()=>setShowAdd(false)}>Cancel</button><button className="btn-primary" onClick={addMeal} disabled={!addF.name.trim()}>Add to Library</button></div>
        </div>
      </div>}

      {showAiR&&<div className="modal-overlay" onClick={e=>e.target.className==="modal-overlay"&&setShowAiR(false)}>
        <div className="modal">
          <div className="modal-title">🤖 Describe a Recipe</div>
          <p style={{fontSize:"0.83rem",color:"var(--muted)",marginBottom:14,lineHeight:1.6}}>Describe any meal and I'll convert it into a full recipe card automatically.</p>
          <textarea className="form-in form-textarea" style={{minHeight:100}} placeholder={'e.g. "My mom\'s green chile chicken casserole with cream of mushroom, green chiles, shredded cheese and crushed chips, bakes for 30 min"'} value={aiRI} onChange={e=>setAiRI(e.target.value)}/>
          <div className="modal-acts"><button className="btn-cancel" onClick={()=>setShowAiR(false)}>Cancel</button><button className="btn-primary" onClick={addAiR} disabled={aiRL||!aiRI.trim()}>{aiRL?"🤖 Converting...":"Add to Library"}</button></div>
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
